name: Release

on:
  push:
    tags: ["v*"]

# Least privilege: permissions are granted per job, not workflow-wide.
permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/validate.yml
    with:
      run-backend: true
      run-web: true
      run-shared-ui: true

  backend-image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-backend:latest

  web-image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-web:latest

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
      - name: Build
        working-directory: backend
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o "idento-backend_linux_${{ matrix.goarch }}" .
      - uses: actions/upload-artifact@v6
        with:
          name: idento-backend_linux_${{ matrix.goarch }}
          path: backend/idento-backend_linux_${{ matrix.goarch }}

  onprem-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Package bundle
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            *[!A-Za-z0-9._-]*) echo "Unsupported release tag: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          mkdir -p dist
          tar -czf "dist/idento-onprem-${RELEASE_TAG}.tar.gz" -C onprem .
      - uses: actions/upload-artifact@v6
        with:
          name: idento-onprem-bundle
          path: dist/idento-onprem-${{ github.ref_name }}.tar.gz

  release:
    needs: [backend-image, web-image, binaries, onprem-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: "idento-*"
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
