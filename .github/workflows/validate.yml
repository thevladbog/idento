name: Validate

on:
  workflow_call:
    inputs:
      run-backend:
        type: boolean
        default: true
      run-web:
        type: boolean
        default: true
      run-shared-ui:
        type: boolean
        default: true

permissions: {}

jobs:
  # Lint Go code (backend + agent)
  lint-go:
    name: Lint Go (Backend & Agent)
    runs-on: ubuntu-latest
    if: inputs.run-backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum

      # Use official golangci-lint action for better performance and caching
      - name: Lint backend
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: backend
          args: ./internal/...

      - name: Lint agent
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: agent
          args: ./...

      - name: Summary
        if: always()
        run: |
          echo "## Go Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend and Agent linting completed" >> $GITHUB_STEP_SUMMARY

  # Gosec security scanner (backend + agent)
  gosec:
    name: Gosec Security (Backend & Agent)
    runs-on: ubuntu-latest
    if: inputs.run-backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run Gosec (backend)
        run: gosec ./...
        working-directory: backend
      - name: Run Gosec (agent)
        run: gosec ./...
        working-directory: agent
      - name: Summary
        if: always()
        run: |
          echo "## Gosec Security Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend and Agent security scan completed" >> $GITHUB_STEP_SUMMARY

  # Test Go code with coverage and race detection
  test-go:
    name: Test Go (Coverage & Race Detection)
    runs-on: ubuntu-latest
    needs: lint-go
    if: inputs.run-backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum

      - name: Test backend with coverage
        run: |
          cd backend
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Test agent with coverage
        run: |
          cd agent
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload backend coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

      - name: Upload agent coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: agent-coverage
          path: agent/coverage.out
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Go Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests completed with race detection" >> $GITHUB_STEP_SUMMARY
          if [ -f backend/coverage.out ]; then
            echo "### Backend Coverage" >> $GITHUB_STEP_SUMMARY
            go tool cover -func=backend/coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f agent/coverage.out ]; then
            echo "### Agent Coverage" >> $GITHUB_STEP_SUMMARY
            go tool cover -func=agent/coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          fi

  # Build Go binaries
  build-go:
    name: Build Go (Backend & Agent)
    runs-on: ubuntu-latest
    needs: test-go
    if: inputs.run-backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum

      - name: Build backend
        run: cd backend && go build -v -o /tmp/idento-backend .

      - name: Build agent
        run: cd agent && go build -v -o /tmp/idento-agent .

      - name: Summary
        run: |
          echo "## Go Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend and Agent built successfully" >> $GITHUB_STEP_SUMMARY
          ls -lh /tmp/idento-* >> $GITHUB_STEP_SUMMARY

  # TypeScript type checking
  typecheck-web:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    if: inputs.run-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc -b

      - name: Summary
        if: always()
        run: |
          echo "## TypeScript Type Check Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type checking completed" >> $GITHUB_STEP_SUMMARY

  # Lint web (ESLint)
  lint-web:
    name: Lint Web (ESLint)
    runs-on: ubuntu-latest
    if: inputs.run-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint with annotations
        run: cd web && npm run lint

      - name: Summary
        if: always()
        run: |
          echo "## ESLint Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web linting completed" >> $GITHUB_STEP_SUMMARY

  # Build web
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [typecheck-web, lint-web]
    if: inputs.run-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

      - name: Summary
        run: |
          echo "## Web Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web built successfully" >> $GITHUB_STEP_SUMMARY
          du -sh web/dist >> $GITHUB_STEP_SUMMARY

  # TypeScript type checking (shared UI package — packages/ui)
  typecheck-shared-ui:
    name: TypeScript Type Check (Shared UI)
    runs-on: ubuntu-latest
    if: inputs.run-shared-ui
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck -w @idento/ui

      - name: Summary
        if: always()
        run: |
          echo "## Shared UI Type Check Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type checking completed" >> $GITHUB_STEP_SUMMARY

  # Lint shared UI (ESLint)
  lint-shared-ui:
    name: Lint Shared UI (ESLint)
    runs-on: ubuntu-latest
    if: inputs.run-shared-ui
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with annotations
        run: npm run lint -w @idento/ui

      - name: Summary
        if: always()
        run: |
          echo "## Shared UI ESLint Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Shared UI linting completed" >> $GITHUB_STEP_SUMMARY

  # Test shared UI (tokens, primitives, verdict vocabulary)
  test-shared-ui:
    name: Test Shared UI
    runs-on: ubuntu-latest
    needs: [typecheck-shared-ui, lint-shared-ui]
    if: inputs.run-shared-ui
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -w @idento/ui

      - name: Summary
        if: always()
        run: |
          echo "## Shared UI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Shared UI tests completed" >> $GITHUB_STEP_SUMMARY
