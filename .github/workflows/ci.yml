name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# Cancel in-progress runs for the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed to optimize job execution
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shared-ui: ${{ steps.filter.outputs.shared-ui }}
      panel: ${{ steps.filter.outputs.panel }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'agent/**'
              - 'go.work'
              - 'go.work.sum'
            web:
              - 'web/**'
            mobile:
              - 'mobile/**'
            desktop:
              - 'desktop/**'
            shared-ui:
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
            panel:
              - 'panel/**'
              - 'packages/**'
              - 'backend/openapi.yaml'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
            deploy:
              - 'deploy/**'

  # Backend + web validation (lint, security scan, test, build)
  validate:
    needs: changes
    uses: ./.github/workflows/validate.yml
    with:
      run-backend: ${{ needs.changes.outputs.backend == 'true' }}
      run-web: ${{ needs.changes.outputs.web == 'true' }}
      run-shared-ui: ${{ needs.changes.outputs.shared-ui == 'true' }}
      run-panel: ${{ needs.changes.outputs.panel == 'true' }}

  # Build + lint Android (conditional, only for mobile changes)
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            mobile/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x mobile/gradlew

      - name: Build and test
        working-directory: mobile
        run: ./gradlew :androidApp:assembleDebug :androidApp:lintDebug :shared:testDebugUnitTest :shared:lintDebug

      - name: Summary
        if: always()
        run: |
          echo "## Android Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ :androidApp assembled, linted, :shared unit tests run" >> $GITHUB_STEP_SUMMARY

  # Build + test :shared on iOS (conditional, only for mobile changes)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            mobile/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/**/*.gradle*', 'mobile/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x mobile/gradlew

      - name: Compile and test :shared for iOS
        working-directory: mobile
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 :shared:compileKotlinIosArm64 :shared:compileTestKotlinIosSimulatorArm64 :shared:iosSimulatorArm64Test

      - name: Summary
        if: always()
        run: |
          echo "## iOS Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ :shared compiled for iosArm64/iosSimulatorArm64, commonTest run on simulator" >> $GITHUB_STEP_SUMMARY

  # Build desktop (Tauri)
  build-desktop:
    name: Build Desktop (Tauri)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (desktop)
        run: cd desktop && npm ci
      - name: Lint (desktop)
        run: cd desktop && npm run lint
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build Tauri
        run: cd desktop && npm run tauri build
        env:
          CI: true
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-bundle
          path: desktop/src-tauri/target/release/bundle/
          retention-days: 7
      - name: Summary
        run: |
          echo "## Desktop Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tauri desktop built successfully" >> $GITHUB_STEP_SUMMARY

  # Build combined Docker image (verification only, no push)
  docker-build-image:
    name: Docker Build Combined Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.panel == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.deploy == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
      - name: Summary
        run: |
          echo "## Combined Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "✅ Combined image built successfully" >> $GITHUB_STEP_SUMMARY

  # First e2e suite for panel/ (P5.3.2) — soft check: runs and reports but
  # is deliberately NOT in ci-success's needs: until proven stable over real
  # PRs (spec decision, 2026-07-21).
  e2e-panel:
    name: E2E Panel (Playwright)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.panel == 'true' || needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            backend/go.sum
            agent/go.sum
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Start Postgres
        run: docker compose up -d db

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker exec idento_db pg_isready -U idento -d idento_db > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Start backend
        env:
          DATABASE_URL: "postgres://idento:idento_password@localhost:5438/idento_db?sslmode=disable"
          JWT_SECRET: "ci-e2e-secret"
          CORS_ALLOWED_ORIGINS: "http://localhost:5174"
        run: |
          cd backend
          nohup go run main.go > /tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8008/api/instance > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time" >&2
          cat /tmp/backend.log
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd panel && npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run e2e -w panel

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: panel/playwright-report/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Panel E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "Soft check — see job status above; not required for merge yet." >> $GITHUB_STEP_SUMMARY

  # Security: Dependency review for pull requests
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: moderate
      
      - name: Summary
        if: always()
        run: |
          echo "## Dependency Security Review" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency review completed" >> $GITHUB_STEP_SUMMARY

  # Final status check job that depends on all critical jobs
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [validate, build-android, build-ios, build-desktop, docker-build-image, dependency-review]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          # This job succeeds only if all needed jobs succeeded or were skipped
          if [[ "${{ needs.validate.result }}" != "success" && "${{ needs.validate.result }}" != "skipped" ]]; then
            echo "validate failed"
            exit 1
          fi
          if [[ "${{ needs.build-desktop.result }}" != "success" && "${{ needs.build-desktop.result }}" != "skipped" ]]; then
            echo "build-desktop failed"
            exit 1
          fi
          if [[ "${{ needs.build-android.result }}" != "success" && "${{ needs.build-android.result }}" != "skipped" ]]; then
            echo "build-android failed"
            exit 1
          fi
          if [[ "${{ needs.build-ios.result }}" != "success" && "${{ needs.build-ios.result }}" != "skipped" ]]; then
            echo "build-ios failed"
            exit 1
          fi
          if [[ "${{ needs.docker-build-image.result }}" != "success" && "${{ needs.docker-build-image.result }}" != "skipped" ]]; then
            echo "docker-build-image failed"
            exit 1
          fi
          if [[ "${{ needs.dependency-review.result }}" != "success" && "${{ needs.dependency-review.result }}" != "skipped" ]]; then
            echo "dependency-review failed"
            exit 1
          fi
          echo "✅ All critical jobs passed!"

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All required checks have passed!" >> $GITHUB_STEP_SUMMARY
