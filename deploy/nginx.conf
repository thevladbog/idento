server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers. The container listens on 8080 but is
    # published on a different port (80 in prod); an absolute redirect would
    # leak :8080 and bounce users to an unexposed port. Keeps redirects
    # correct behind port maps and reverse proxies.
    absolute_redirect off;

    # Console SPA (old web/, rebased under /super-admin/)
    # Canonicalize the bare mount to the trailing-slash form so bookmarks/
    # typed URLs land on the console, not the panel's catch-all.
    location = /super-admin {
        return 301 /super-admin/;
    }
    location /super-admin/ {
        try_files $uri $uri/ /super-admin/index.html;
    }
    location /super-admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location = /super-admin/env.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Panel SPA (new panel/) at root
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location = /env.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
}
