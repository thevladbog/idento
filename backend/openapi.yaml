# Idento REST API — contract for the customer panel and shared surfaces.
#
# TRUTH RULES (P0.3):
# - This file is contract-tested: backend/internal/handler/openapi_contract_*_test.go
#   validates real handler responses against these schemas, and TestMain
#   (OPENAPI_COVERAGE=1) fails if any documented operation lacks a test.
# - New endpoints are documented HERE FIRST, then implemented, then contract-tested,
#   then the panel client is regenerated (npm run generate:api -w panel).
#
# INTENTIONALLY UNDOCUMENTED surfaces (documented in their own tracks):
#   /api/mobile/*, POST /api/zones/{zone_id}/scan          — mobile track
#   POST /api/events/{event_id}/checkins/batch             — mobile offline sync
#   GET|POST /api/sync                                     — desktop/mobile sync
#   POST /api/public/import                                — external API-key integration
#   /api/super-admin/*                                     — platform console (web/)
#   GET /api/version, /openapi.yaml, /docs, /printer-qr,
#   POST /api/util/printers/generate-qr                    — utility surfaces
openapi: 3.0.3
info:
  title: Idento API
  version: "1.0"
  description: Idento event check-in platform REST API.
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      description: >
        Standard handler error: {"error": "..."} with an optional machine code
        (e.g. code=tenant_suspended on 403 from the tenant gate). Closed shape
        (additionalProperties: false) so it never ambiguously matches the
        richer LimitExceededError body in a oneOf.
      properties:
        error: { type: string }
        code: { type: string }
      required: [error]
      additionalProperties: false
    HTTPError:
      type: object
      description: echo.NewHTTPError / rate-limiter shape.
      properties:
        message: { type: string }
      required: [message]
    LimitExceededError:
      type: object
      description: >
        middleware.CheckLimits 403 body when a tenant resource limit
        (e.g. users) is at or over its plan max.
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, upgrade_required, limit_type]
      additionalProperties: false
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [admin, manager, staff] }
        is_super_admin: { type: boolean }
        has_qr_token: { type: boolean }
        qr_token_created_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, tenant_id, email, role, is_super_admin, has_qr_token, created_at, updated_at]
    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        archived_at: { type: string, format: date-time }
        settings: { type: object, additionalProperties: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, status, created_at, updated_at]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants, current_tenant]
    RegisterResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants]
    QrLoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [token, user]
    InstanceInfo:
      type: object
      properties:
        mode: { type: string, enum: [saas, onprem] }
        version: { type: string }
        license: { nullable: true }
      required: [mode, version]
    MeResponse:
      type: object
      description: The caller's identity as carried by the current JWT (not re-read from the DB).
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        role: { type: string }
      required: [user_id, tenant_id, role]
    SwitchTenantResponse:
      type: object
      properties:
        token: { type: string }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, current_tenant]
    TenantMembership:
      type: object
      description: >
        A tenant summary annotated with the caller's role in it. Distinct
        from Tenant: this shape is built as a literal map (GetUserTenants,
        GetTenant), so every key is always present in the JSON — nullable
        fields serialize as null instead of being omitted, unlike Tenant's
        omitempty struct fields. Has no status/archived_at.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        settings: { type: object, additionalProperties: true, nullable: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        role: { type: string }
      required: [id, name, settings, logo_url, website, contact_email, created_at, updated_at, role]
    QRTokenResponse:
      type: object
      properties:
        qr_token: { type: string }
        user_id: { type: string }
        email: { type: string }
      required: [qr_token, user_id, email]
    Event:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        start_date: { type: string, format: date-time, nullable: true }
        end_date: { type: string, format: date-time, nullable: true }
        location: { type: string }
        field_schema:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, tenant_id, name, created_at, updated_at]
    EventStaff:
      type: object
      description: >
        A staff-to-event assignment record — the response shape for POST
        /api/events/{event_id}/staff. Distinct from GET .../staff, which
        returns full User records (store.GetEventStaff joins through the
        event_staff table back to users, not this assignment row shape).
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by: { type: string, format: uuid }
      required: [id, event_id, user_id, assigned_at, assigned_by]
    ZoneScanStats:
      type: object
      properties:
        allowed: { type: integer }
        no_access: { type: integer }
        not_registered: { type: integer }
      required: [allowed, no_access, not_registered]
    EventStatsResponse:
      type: object
      properties:
        total_attendees: { type: integer }
        checked_in: { type: integer }
        zone_stats: { $ref: "#/components/schemas/ZoneScanStats" }
      required: [total_attendees, checked_in]
    BadgeZplResponse:
      type: object
      description: >
        JSON wrapper around generated ZPL text — BadgeZPL returns c.JSON,
        not raw text/plain, so "zpl" is the ZPL program serialized as a
        JSON string value (not a Content-Type: text/plain body).
      properties:
        zpl: { type: string }
      required: [zpl]
    CreateProvisioningTokenResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
      required: [token, expires_at]
    ProvisionedStationConfig:
      type: object
      properties:
        event_id: { type: string, format: uuid }
        event_name: { type: string }
        staff_name: { type: string }
      required: [event_id, event_name, staff_name]
    ProvisionStationResponse:
      type: object
      properties:
        station_config: { $ref: "#/components/schemas/ProvisionedStationConfig" }
        staff_jwt: { type: string }
        device_number: { type: integer }
      required: [station_config, staff_jwt, device_number]
    Attendee:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        company: { type: string }
        position: { type: string }
        code: { type: string }
        checkin_status: { type: boolean }
        checked_in_at: { type: string, format: date-time, nullable: true }
        checked_in_by: { type: string, format: uuid, nullable: true }
        checked_in_by_email:
          type: string
          nullable: true
          description: Email of the user who checked the attendee in (set once, on the first check-in transition).
        checked_in_device_number: { type: integer, nullable: true }
        checked_in_point_name: { type: string, nullable: true }
        printed_count: { type: integer }
        blocked: { type: boolean }
        block_reason: { type: string, nullable: true }
        packet_delivered: { type: boolean }
        registered_at: { type: string, format: date-time, nullable: true }
        registration_zone_id: { type: string, format: uuid, nullable: true }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft-delete marker set by DELETE /api/attendees/{id}; the row is never hard-deleted.
      required:
        [
          id,
          event_id,
          first_name,
          last_name,
          email,
          company,
          position,
          code,
          checkin_status,
          printed_count,
          blocked,
          packet_delivered,
          created_at,
          updated_at,
        ]
    DuplicateInfo:
      type: object
      description: One row BulkCreateAttendees skipped, keyed by why it was considered a duplicate of an existing attendee.
      properties:
        email: { type: string }
        code: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        reason: { type: string, enum: [email, code] }
      required: [email, first_name, last_name, reason]
    BulkImportResponse:
      type: object
      properties:
        message: { type: string }
        created: { type: integer }
        skipped: { type: integer }
        total: { type: integer }
        duplicates:
          type: array
          items: { $ref: "#/components/schemas/DuplicateInfo" }
      required: [message, created, skipped, total]
    BulkLimitExceededError:
      type: object
      description: >
        BulkCreateAttendees' own 403 body when importing the whole batch
        would push attendees_per_event over its plan max — built inline in
        the handler (calling Store.CheckAttendeeLimit directly with
        adding=len(req.Attendees)), NOT middleware.CheckAttendeeLimits
        (which only wraps the single-create route and always checks
        adding=1). Same fields as LimitExceededError plus "adding" — the
        batch size being requested — so it cannot reuse that schema
        (LimitExceededError is additionalProperties: false).
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        adding: { type: integer }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, adding, upgrade_required, limit_type]
      additionalProperties: false
    GenerateAttendeeCodesResponse:
      type: object
      properties:
        status: { type: string }
        updated_count: { type: integer }
        message: { type: string }
      required: [status, updated_count, message]
    EventZone:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        zone_type: { type: string, description: "registration, general, vip, workshop" }
        order_index: { type: integer }
        open_time: { type: string, nullable: true, description: "HH:MM format" }
        close_time: { type: string, nullable: true, description: "HH:MM format" }
        is_registration_zone: { type: boolean }
        requires_registration: { type: boolean }
        is_active: { type: boolean }
        settings: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        [
          id,
          event_id,
          name,
          zone_type,
          order_index,
          is_registration_zone,
          requires_registration,
          is_active,
          created_at,
          updated_at,
        ]
    EventZoneWithStats:
      type: object
      description: >
        GetEventZones' with_stats=true response shape (store.GetEventZonesWithStats) —
        each zone paired with aggregate counts computed at read time. zone is
        always populated (never null) — the store builds one of these per row
        already-scanned from GetEventZones.
      properties:
        zone: { $ref: "#/components/schemas/EventZone" }
        total_checkins: { type: integer }
        today_checkins: { type: integer }
        assigned_staff: { type: integer }
        access_rules_count: { type: integer }
      required: [zone, total_checkins, today_checkins, assigned_staff, access_rules_count]
    ZoneAccessRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        category: { type: string }
        allowed: { type: boolean }
        time_from:
          type: string
          nullable: true
          description: "HH:MM, inclusive lower bound; null = no lower bound"
        time_to:
          type: string
          nullable: true
          description: "HH:MM, inclusive upper bound; null = no upper bound"
        created_at: { type: string, format: date-time }
      required: [id, zone_id, category, allowed, created_at]
    AttendeeZoneAccess:
      type: object
      description: >
        An individual per-attendee access override for a zone (highest
        priority in CheckZoneAccess, above category-based ZoneAccessRule).
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        allowed: { type: boolean }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, attendee_id, zone_id, allowed, created_at, updated_at]
    StaffZoneAssignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by:
          type: string
          format: uuid
          nullable: true
          description: The caller who created the assignment; nullable in the DB, always populated for rows created via POST /api/zones/{zone_id}/staff.
      required: [id, user_id, zone_id, assigned_at]
    ZoneCheckin:
      type: object
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        checked_in_at: { type: string, format: date-time }
        checked_in_by: { type: string, format: uuid, nullable: true }
        event_day: { type: string, format: date-time, description: "Date only — time component is truncated by the store." }
        metadata: { type: object, additionalProperties: true }
      required: [id, attendee_id, zone_id, checked_in_at, event_day]
    MovementHistoryEntry:
      type: object
      description: >
        One zone check-in enriched with the zone's name/type at read time
        (GetAttendeeZoneHistory). If the per-entry zone lookup fails, the
        checkin is still included with zone_name/zone_type left at their
        zero value ("") rather than failing the whole request.
      properties:
        checkin: { $ref: "#/components/schemas/ZoneCheckin" }
        zone_name: { type: string }
        zone_type: { type: string }
      required: [checkin, zone_name, zone_type]
    ZoneCheckInResponse:
      type: object
      description: >
        POST /api/zones/checkin's single response envelope, used for every
        status code the handler itself returns (200/400/403/404/500) — not
        just the success case. success is false and error is populated on
        every non-2xx path; checked_in_at has no omitempty on the Go struct
        so it always serializes (zero value on error paths).
      properties:
        success: { type: boolean }
        attendee: { $ref: "#/components/schemas/Attendee" }
        zone: { $ref: "#/components/schemas/EventZone" }
        checked_in_at: { type: string, format: date-time }
        packet_delivered: { type: boolean }
        message: { type: string }
        error: { type: string }
      required: [success, checked_in_at, packet_delivered]
    CheckinOverride:
      type: object
      description: Audit-logged staff override of an already_checked/not_registered/no_access check-in verdict ("Всё равно пропустить").
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid, nullable: true }
        context: { type: string, enum: [already_checked, not_registered, no_access] }
        staff_user_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
      required: [id, attendee_id, context, staff_user_id, created_at]
  responses:
    RateLimited:
      description: Rate limit exceeded (10/min per IP).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/HTTPError" }
paths:
  /auth/login:
    post:
      operationId: login
      summary: Email + password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Authenticated; token carries the default tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          description: Malformed or empty email/password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Wrong credentials or user has no organizations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/register:
    post:
      operationId: register
      summary: Self-serve tenant + admin signup (SaaS-only — this route is not mounted on-prem and 404s there)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_name: { type: string }
                email: { type: string }
                password: { type: string }
              required: [tenant_name, email, password]
      responses:
        "201":
          description: Tenant created (or existing user attached to a new tenant).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400":
          description: Malformed or empty fields.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Existing email with wrong password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/login-qr:
    post:
      operationId: loginWithQr
      summary: Staff login by QR-card token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_token: { type: string }
              required: [qr_token]
      responses:
        "200":
          description: Authenticated as the staff user's own tenant/role.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QrLoginResponse" }
        "400":
          description: Malformed body (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "401":
          description: Unknown or expired QR token (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Token mint failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /health:
    get:
      operationId: health
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
  /api/instance:
    get:
      operationId: getInstance
      summary: Deployment mode & version (public — frontends read this before login)
      security: []
      responses:
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstanceInfo" }
  /api/me:
    get:
      operationId: getMe
      summary: >
        Caller's identity from the current JWT. NOTE: unlike every other
        /api/* route, this path is explicitly exempt from TenantGate
        (middleware.TenantGate hard-codes an early return for "/api/me"), so
        a suspended tenant's users can still resolve who they are — no 403
        tenant_suspended is possible here.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Identity carried by the token (not re-read from the DB).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/switch-tenant:
    post:
      operationId: switchTenant
      summary: Mint a new JWT scoped to a different tenant the caller belongs to
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id: { type: string }
              required: [tenant_id]
      responses:
        "200":
          description: New token scoped to the requested tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwitchTenantResponse" }
        "400":
          description: Malformed body, or tenant_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Impersonation sessions are sealed (no switching tenants while
            impersonating), or the caller has no membership in tenant_id.
            Also covers tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load the user/tenant, or to mint the token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants:
    get:
      operationId: getUserTenants
      summary: All organizations the caller belongs to, each annotated with their role
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Tenant memberships (role defaults to "viewer" if the per-tenant role lookup fails).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantMembership" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load tenants for the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants/{id}:
    get:
      operationId: getTenant
      summary: A single tenant/organization the caller has a role in
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tenant with the caller's role in it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantMembership" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Caller has no role in this tenant, or tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Tenant does not exist.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updateTenant
      summary: Update tenant/organization profile fields (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Every field is optional; only provided (non-null) fields are applied.
              properties:
                name: { type: string }
                settings: { type: object, additionalProperties: true }
                logo_url: { type: string }
                website: { type: string }
                contact_email: { type: string }
      responses:
        "200":
          description: Updated tenant (full record, not the role-annotated membership shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Caller is not admin in this tenant, or tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Tenant does not exist.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failed to persist the update.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/users:
    get:
      operationId: getUsers
      summary: All users in the caller's active tenant (admin/manager only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Users in the tenant.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403":
          description: >
            Caller role is not admin/manager (echo.NewHTTPError → HTTPError),
            or tenant_suspended from the tenant gate (→ Error).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to fetch users (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
    post:
      operationId: createUser
      summary: Create a staff or manager user in the caller's active tenant (admin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [staff, manager] }
              required: [email, password, role]
      responses:
        "201":
          description: Created user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: Malformed body, or role is not staff/manager (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            Caller is not admin (HTTPError), tenant_suspended from the tenant
            gate (Error), or middleware.CheckLimits rejected the request
            because the tenant is at/over its "users" plan limit
            (LimitExceededError) — this middleware runs before the handler.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/LimitExceededError" }
        "500":
          description: >
            Password hash failure (e.g. password over bcrypt's 72-byte limit),
            or a store failure creating the user / tenant membership
            (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
  /api/users/{id}/qr-token:
    post:
      operationId: generateQRToken
      summary: Generate a QR-card login token for a staff user (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: New QR token for the target user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QRTokenResponse" }
        "400":
          description: id is not a UUID (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            Caller is not admin (HTTPError), or tenant_suspended from the
            tenant gate (Error).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Target user does not exist, or is not a member of the caller's
            active tenant (uniform 404 either way — doesn't reveal
            cross-tenant existence).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "500":
          description: Store failed to persist the new QR token (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
  /api/events:
    get:
      operationId: getEvents
      summary: All events in the caller's active tenant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Events for the tenant.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to fetch events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: createEvent
      summary: Create an event in the caller's active tenant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: string, format: date-time }
                location: { type: string }
              required: [name]
      responses:
        "201":
          description: >
            Created event. Usage is logged best-effort afterward (a LogUsage
            failure is logged server-side but does not fail the request).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: Malformed request body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            tenant_suspended from the tenant gate (Error), or
            middleware.CheckLimits rejected the request because the tenant
            is at/over its "events_per_month" plan limit
            (LimitExceededError) — this middleware runs before the handler
            and produces the exact same response shape as POST /api/users'
            CheckLimits branch, since the body is built from resourceType
            generically; only limit_type differs.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/LimitExceededError" }
        "500":
          description: Failed to create the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{id}:
    get:
      operationId: getEvent
      summary: A single event scoped to the caller's active tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership masks "foreign" as "missing" — no
            existence oracle).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updateEvent
      summary: >
        Full replace of an event's editable fields. Any authenticated tenant
        member can call this — the handler checks tenant ownership only, no
        role restriction.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Unlike PUT /api/tenants/{id}, every field here is applied
                unconditionally (event.Name = req.Name, etc.) — omitting a
                field in the body blanks it out rather than preserving the
                existing value. This is a full replace, not a partial patch.
              properties:
                name: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: string, format: date-time }
                location: { type: string }
                field_schema:
                  type: array
                  items: { type: string }
                custom_fields: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated event (fields applied verbatim from the request body).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event does not exist, or belongs to a different tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading or persisting the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{id}/badge-zpl:
    post:
      operationId: badgeZpl
      summary: Generate ZPL for one attendee's badge from the event's stored badge template
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendee_id: { type: string, format: uuid }
              required: [attendee_id]
      responses:
        "200":
          description: >
            Generated ZPL. JSON-wrapped (content-type application/json), NOT
            raw text/plain — see BadgeZplResponse.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BadgeZplResponse" }
        "400":
          description: >
            Invalid event/attendee ID, missing or invalid attendee_id, the
            attendee does not belong to this event, or the event's stored
            badge template is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event or attendee does not exist, or belongs to a different
            tenant (both requireEventOwnership and requireAttendeeOwnership
            mask "foreign" as "missing").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event or attendee ownership
            (requireEventOwnership or requireAttendeeOwnership propagates a
            raw store error through writeErr's fallback branch, instead of
            masking it as a 404).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/stats:
    get:
      operationId: getEventStats
