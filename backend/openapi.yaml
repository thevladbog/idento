# Idento REST API — contract for the customer panel and shared surfaces.
#
# TRUTH RULES (P0.3):
# - This file is contract-tested: backend/internal/handler/openapi_contract_*_test.go
#   validates real handler responses against these schemas, and TestMain
#   (OPENAPI_COVERAGE=1) fails if any documented operation lacks a test.
# - New endpoints are documented HERE FIRST, then implemented, then contract-tested,
#   then the panel client is regenerated (npm run generate:api -w panel).
#
# INTENTIONALLY UNDOCUMENTED surfaces (documented in their own tracks):
#   /api/mobile/*, POST /api/zones/{zone_id}/scan          — mobile track
#   POST /api/events/{event_id}/checkins/batch             — mobile offline sync
#   GET|POST /api/sync                                     — desktop/mobile sync
#   POST /api/public/import                                — external API-key integration
#   /api/super-admin/*                                     — platform console (web/)
#   GET /api/version, /openapi.yaml, /docs, /printer-qr,
#   POST /api/util/printers/generate-qr                    — utility surfaces
openapi: 3.0.3
info:
  title: Idento API
  version: "1.0"
  description: Idento event check-in platform REST API.
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      description: >
        Standard handler error: {"error": "..."} with an optional machine code
        (e.g. code=tenant_suspended on 403 from the tenant gate). Closed shape
        (additionalProperties: false) so it never ambiguously matches the
        richer LimitExceededError body in a oneOf.
      properties:
        error: { type: string }
        code: { type: string }
      required: [error]
      additionalProperties: false
    HTTPError:
      type: object
      description: echo.NewHTTPError / rate-limiter shape.
      properties:
        message: { type: string }
      required: [message]
    LimitExceededError:
      type: object
      description: >
        middleware.CheckLimits 403 body when a tenant resource limit
        (e.g. users) is at or over its plan max.
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, upgrade_required, limit_type]
      additionalProperties: false
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [admin, manager, staff] }
        is_super_admin: { type: boolean }
        has_qr_token: { type: boolean }
        qr_token_created_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, tenant_id, email, role, is_super_admin, has_qr_token, created_at, updated_at]
    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        archived_at: { type: string, format: date-time }
        settings: { type: object, additionalProperties: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, status, created_at, updated_at]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants, current_tenant]
    RegisterResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants]
    QrLoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [token, user]
    InstanceInfo:
      type: object
      properties:
        mode: { type: string, enum: [saas, onprem] }
        version: { type: string }
        license: { nullable: true }
      required: [mode, version]
    MeResponse:
      type: object
      description: The caller's identity as carried by the current JWT (not re-read from the DB).
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        role: { type: string }
      required: [user_id, tenant_id, role]
    SwitchTenantResponse:
      type: object
      properties:
        token: { type: string }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, current_tenant]
    TenantMembership:
      type: object
      description: >
        A tenant summary annotated with the caller's role in it. Distinct
        from Tenant: this shape is built as a literal map (GetUserTenants,
        GetTenant), so every key is always present in the JSON — nullable
        fields serialize as null instead of being omitted, unlike Tenant's
        omitempty struct fields. Has no status/archived_at.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        settings: { type: object, additionalProperties: true, nullable: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        role: { type: string }
      required: [id, name, settings, logo_url, website, contact_email, created_at, updated_at, role]
    QRTokenResponse:
      type: object
      properties:
        qr_token: { type: string }
        user_id: { type: string }
        email: { type: string }
      required: [qr_token, user_id, email]
    Event:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        start_date: { type: string, format: date-time, nullable: true }
        end_date: { type: string, format: date-time, nullable: true }
        location: { type: string }
        field_schema:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, tenant_id, name, created_at, updated_at]
    EventStaff:
      type: object
      description: >
        A staff-to-event assignment record — the response shape for POST
        /api/events/{event_id}/staff. Distinct from GET .../staff, which
        returns full User records (store.GetEventStaff joins through the
        event_staff table back to users, not this assignment row shape).
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by: { type: string, format: uuid }
      required: [id, event_id, user_id, assigned_at, assigned_by]
    ZoneScanStats:
      type: object
      properties:
        allowed: { type: integer }
        no_access: { type: integer }
        not_registered: { type: integer }
      required: [allowed, no_access, not_registered]
    EventStatsResponse:
      type: object
      properties:
        total_attendees: { type: integer }
        checked_in: { type: integer }
        zone_stats: { $ref: "#/components/schemas/ZoneScanStats" }
      required: [total_attendees, checked_in]
    ReadinessStep:
      type: object
      properties:
        key: { type: string, enum: [attendees, badge, zones, staff, equipment] }
        status: { type: string, enum: [done, not_done, skipped] }
        count: { type: integer }
      required: [key, status]
    EventReadinessResponse:
      type: object
      description: >
        Per-event readiness aggregate (parent-spec backend #6). Steps are
        always returned in pipeline order: attendees, badge, zones, staff,
        equipment. ready = attendees.done && badge.done && staff.done —
        zones never blocks (skipped when the event has no zones), and
        equipment is always not_done until its P3/P4 wiring exists and
        never blocks in P1.
      properties:
        ready: { type: boolean }
        steps:
          type: array
          items: { $ref: "#/components/schemas/ReadinessStep" }
      required: [ready, steps]
    BadgeZplResponse:
      type: object
      description: >
        JSON wrapper around generated ZPL text — BadgeZPL returns c.JSON,
        not raw text/plain, so "zpl" is the ZPL program serialized as a
        JSON string value (not a Content-Type: text/plain body).
      properties:
        zpl: { type: string }
      required: [zpl]
    CreateProvisioningTokenResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
      required: [token, expires_at]
    ProvisionedStationConfig:
      type: object
      properties:
        event_id: { type: string, format: uuid }
        event_name: { type: string }
        staff_name: { type: string }
      required: [event_id, event_name, staff_name]
    ProvisionStationResponse:
      type: object
      properties:
        station_config: { $ref: "#/components/schemas/ProvisionedStationConfig" }
        staff_jwt: { type: string }
        device_number: { type: integer }
      required: [station_config, staff_jwt, device_number]
    Attendee:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        company: { type: string }
        position: { type: string }
        code: { type: string }
        checkin_status: { type: boolean }
        checked_in_at: { type: string, format: date-time, nullable: true }
        checked_in_by: { type: string, format: uuid, nullable: true }
        checked_in_by_email:
          type: string
          nullable: true
          description: Email of the user who checked the attendee in (set once, on the first check-in transition).
        checked_in_device_number: { type: integer, nullable: true }
        checked_in_point_name: { type: string, nullable: true }
        printed_count: { type: integer }
        blocked: { type: boolean }
        block_reason: { type: string, nullable: true }
        packet_delivered: { type: boolean }
        registered_at: { type: string, format: date-time, nullable: true }
        registration_zone_id: { type: string, format: uuid, nullable: true }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft-delete marker set by DELETE /api/attendees/{id}; the row is never hard-deleted.
      required:
        [
          id,
          event_id,
          first_name,
          last_name,
          email,
          company,
          position,
          code,
          checkin_status,
          printed_count,
          blocked,
          packet_delivered,
          created_at,
          updated_at,
        ]
    AttendeeListPage:
      type: object
      description: >
        Envelope returned by GET /api/events/{event_id}/attendees when the
        `page` or `per_page` query param is present. `total` is the count of
        attendees matching the active filters (code/search/zone/status)
        before paging is applied, not the length of `attendees`.
      properties:
        attendees:
          type: array
          items: { $ref: "#/components/schemas/Attendee" }
        total: { type: integer, description: Total matching attendees across all pages. }
        page: { type: integer }
        per_page: { type: integer }
      required: [attendees, total, page, per_page]
      additionalProperties: false
    DuplicateInfo:
      type: object
      description: One row BulkCreateAttendees skipped, keyed by why it was considered a duplicate of an existing attendee.
      properties:
        email: { type: string }
        code: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        reason: { type: string, enum: [email, code] }
      required: [email, first_name, last_name, reason]
    BulkRowError:
      type: object
      description: >
        Per-row error detail from BulkCreateAttendees. Row is 1-based index
        into the submitted attendees array. Data is display text
        (first_name+last_name trimmed, fallback to email, may be empty). Problem
        is a stable string the frontend switches on.
      properties:
        row: { type: integer, description: "1-based index in the request attendees array" }
        data: { type: string, description: "Display text for the row (first+last name, fallback to email)" }
        problem: { type: string, enum: [duplicate_email, duplicate_code, create_failed] }
      required: [row, data, problem]
    BulkImportResponse:
      type: object
      properties:
        message: { type: string }
        created: { type: integer }
        skipped: { type: integer }
        total: { type: integer }
        duplicates:
          type: array
          items: { $ref: "#/components/schemas/DuplicateInfo" }
        errors:
          type: array
          items: { $ref: "#/components/schemas/BulkRowError" }
          description: >
            Per-row errors from the import. Includes duplicates and CreateAttendee
            failures. Each error is tracked by row number, display data, and problem code.
      required: [message, created, skipped, total]
    BulkLimitExceededError:
      type: object
      description: >
        BulkCreateAttendees' own 403 body when importing the whole batch
        would push attendees_per_event over its plan max — built inline in
        the handler (calling Store.CheckAttendeeLimit directly with
        adding=len(req.Attendees)), NOT middleware.CheckAttendeeLimits
        (which only wraps the single-create route and always checks
        adding=1). Same fields as LimitExceededError plus "adding" — the
        batch size being requested — so it cannot reuse that schema
        (LimitExceededError is additionalProperties: false).
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        adding: { type: integer }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, adding, upgrade_required, limit_type]
      additionalProperties: false
    GenerateAttendeeCodesResponse:
      type: object
      properties:
        status: { type: string }
        updated_count: { type: integer }
        message: { type: string }
      required: [status, updated_count, message]
    EventZone:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        zone_type: { type: string, description: "registration, general, vip, workshop" }
        order_index: { type: integer }
        open_time: { type: string, nullable: true, description: "HH:MM format" }
        close_time: { type: string, nullable: true, description: "HH:MM format" }
        is_registration_zone: { type: boolean }
        requires_registration: { type: boolean }
        is_active: { type: boolean }
        settings: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        [
          id,
          event_id,
          name,
          zone_type,
          order_index,
          is_registration_zone,
          requires_registration,
          is_active,
          created_at,
          updated_at,
        ]
    EventZoneWithStats:
      type: object
      description: >
        GetEventZones' with_stats=true response shape (store.GetEventZonesWithStats) —
        each zone paired with aggregate counts computed at read time. zone is
        always populated (never null) — the store builds one of these per row
        already-scanned from GetEventZones.
      properties:
        zone: { $ref: "#/components/schemas/EventZone" }
        total_checkins: { type: integer }
        today_checkins: { type: integer }
        assigned_staff: { type: integer }
        access_rules_count: { type: integer }
      required: [zone, total_checkins, today_checkins, assigned_staff, access_rules_count]
    ZoneAccessRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        category: { type: string }
        allowed: { type: boolean }
        time_from:
          type: string
          nullable: true
          description: "HH:MM, inclusive lower bound; null = no lower bound"
        time_to:
          type: string
          nullable: true
          description: "HH:MM, inclusive upper bound; null = no upper bound"
        created_at: { type: string, format: date-time }
      required: [id, zone_id, category, allowed, created_at]
    AttendeeZoneAccess:
      type: object
      description: >
        An individual per-attendee access override for a zone (highest
        priority in CheckZoneAccess, above category-based ZoneAccessRule).
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        allowed: { type: boolean }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, attendee_id, zone_id, allowed, created_at, updated_at]
    StaffZoneAssignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by:
          type: string
          format: uuid
          nullable: true
          description: The caller who created the assignment; nullable in the DB, always populated for rows created via POST /api/zones/{zone_id}/staff.
      required: [id, user_id, zone_id, assigned_at]
    ZoneCheckin:
      type: object
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        checked_in_at: { type: string, format: date-time }
        checked_in_by: { type: string, format: uuid, nullable: true }
        event_day: { type: string, format: date-time, description: "Date only — time component is truncated by the store." }
        metadata: { type: object, additionalProperties: true }
      required: [id, attendee_id, zone_id, checked_in_at, event_day]
    MovementHistoryEntry:
      type: object
      description: >
        One zone check-in enriched with the zone's name/type at read time
        (GetAttendeeZoneHistory). If the per-entry zone lookup fails, the
        checkin is still included with zone_name/zone_type left at their
        zero value ("") rather than failing the whole request.
      properties:
        checkin: { $ref: "#/components/schemas/ZoneCheckin" }
        zone_name: { type: string }
        zone_type: { type: string }
      required: [checkin, zone_name, zone_type]
    ZoneCheckInResponse:
      type: object
      description: >
        POST /api/zones/checkin's single response envelope, used for every
        status code the handler itself returns (200/400/403/404/500) — not
        just the success case. success is false and error is populated on
        every non-2xx path; checked_in_at has no omitempty on the Go struct
        so it always serializes (zero value on error paths).
      properties:
        success: { type: boolean }
        attendee: { $ref: "#/components/schemas/Attendee" }
        zone: { $ref: "#/components/schemas/EventZone" }
        checked_in_at: { type: string, format: date-time }
        packet_delivered: { type: boolean }
        message: { type: string }
        error: { type: string }
      required: [success, checked_in_at, packet_delivered]
    CheckinOverride:
      type: object
      description: Audit-logged staff override of an already_checked/not_registered/no_access check-in verdict ("Всё равно пропустить").
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid, nullable: true }
        context: { type: string, enum: [already_checked, not_registered, no_access] }
        staff_user_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
      required: [id, attendee_id, context, staff_user_id, created_at]
    FontListItem:
      type: object
      description: >
        Lightweight font metadata (models.FontListItem) — the shape actually
        returned by GET /api/events/{event_id}/fonts (per item) and POST
        /api/events/{event_id}/fonts (the created item). The full
        models.Font (which also carries the raw binary Data and
        uploaded_by/license_accepted_at) is never serialized to JSON by any
        handler — Data is json:"-" and the other fields are simply not
        selected by GetFontsByEventID's query — so no separate "Font"
        component is defined here.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        family: { type: string, description: "CSS font-family value, e.g. \"Roboto\"." }
        weight: { type: string, description: "e.g. \"normal\", \"bold\", \"700\"." }
        style: { type: string, description: "\"normal\" or \"italic\"." }
        format: { type: string, enum: [woff2, woff, truetype, opentype], description: "Derived server-side from the uploaded file's extension." }
        size: { type: integer, description: "File size in bytes." }
        created_at: { type: string, format: date-time }
      required: [id, name, family, weight, style, format, size, created_at]
    APIKey:
      type: object
      description: >
        models.APIKey with key_hash/key_hash_bcrypt excluded (json:"-" in
        Go — the secret material is never returned once created; only
        key_preview, the first 8 characters of the plain key, is exposed
        for display).
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        key_preview: { type: string, description: "First 8 characters of the plain key plus \"...\"." }
        expires_at: { type: string, format: date-time, description: "Omitted (not null) when unset — Go's json:\",omitempty\" on a nil *time.Time." }
        last_used_at: { type: string, format: date-time, description: "Omitted (not null) when unset." }
        revoked_at: { type: string, format: date-time, description: "Omitted (not null) unless the key was revoked." }
        created_at: { type: string, format: date-time }
      required: [id, event_id, name, key_preview, created_at]
    CreateAPIKeyResponse:
      type: object
      description: >
        POST /api/events/{event_id}/api-keys's 201 body. plain_key is the
        only time the actual secret is ever returned — it is not
        recoverable afterward (only key_hash/key_hash_bcrypt are persisted).
      properties:
        api_key: { $ref: "#/components/schemas/APIKey" }
        plain_key: { type: string }
      required: [api_key, plain_key]
  responses:
    RateLimited:
      description: Rate limit exceeded (10/min per IP).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/HTTPError" }
paths:
  /auth/login:
    post:
      operationId: login
      summary: Email + password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Authenticated; token carries the default tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          description: Malformed or empty email/password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Wrong credentials or user has no organizations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/register:
    post:
      operationId: register
      summary: Self-serve tenant + admin signup (SaaS-only — this route is not mounted on-prem and 404s there)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_name: { type: string }
                email: { type: string }
                password: { type: string }
              required: [tenant_name, email, password]
      responses:
        "201":
          description: Tenant created (or existing user attached to a new tenant).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400":
          description: Malformed or empty fields.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Existing email with wrong password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/login-qr:
    post:
      operationId: loginWithQr
      summary: Staff login by QR-card token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_token: { type: string }
              required: [qr_token]
      responses:
        "200":
          description: Authenticated as the staff user's own tenant/role.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QrLoginResponse" }
        "400":
          description: Malformed body (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "401":
          description: Unknown or expired QR token (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Token mint failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /health:
    get:
      operationId: health
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
  /api/instance:
    get:
      operationId: getInstance
      summary: Deployment mode & version (public — frontends read this before login)
      security: []
      responses:
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstanceInfo" }
  /api/me:
    get:
      operationId: getMe
      summary: >
        Caller's identity from the current JWT. NOTE: unlike every other
        /api/* route, this path is explicitly exempt from TenantGate
        (middleware.TenantGate hard-codes an early return for "/api/me"), so
        a suspended tenant's users can still resolve who they are — no 403
        tenant_suspended is possible here.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Identity carried by the token (not re-read from the DB).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/switch-tenant:
    post:
      operationId: switchTenant
      summary: Mint a new JWT scoped to a different tenant the caller belongs to
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id: { type: string }
              required: [tenant_id]
      responses:
        "200":
          description: New token scoped to the requested tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwitchTenantResponse" }
        "400":
          description: Malformed body, or tenant_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Impersonation sessions are sealed (no switching tenants while
            impersonating), or the caller has no membership in tenant_id.
            Also covers tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load the user/tenant, or to mint the token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants:
    get:
      operationId: getUserTenants
      summary: All organizations the caller belongs to, each annotated with their role
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Tenant memberships (role defaults to "viewer" if the per-tenant role lookup fails).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantMembership" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load tenants for the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants/{id}:
    get:
      operationId: getTenant
      summary: A single tenant/organization the caller has a role in
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tenant with the caller's role in it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantMembership" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Caller has no role in this tenant, or tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Tenant does not exist.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updateTenant
      summary: Update tenant/organization profile fields (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Every field is optional; only provided (non-null) fields are applied.
              properties:
                name: { type: string }
                settings: { type: object, additionalProperties: true }
                logo_url: { type: string }
                website: { type: string }
                contact_email: { type: string }
      responses:
        "200":
          description: Updated tenant (full record, not the role-annotated membership shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Caller is not admin in this tenant, or tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Tenant does not exist.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failed to persist the update.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/users:
    get:
      operationId: getUsers
      summary: All users in the caller's active tenant (admin/manager only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Users in the tenant.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403":
          description: >
            Caller role is not admin/manager (echo.NewHTTPError → HTTPError),
            or tenant_suspended from the tenant gate (→ Error).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to fetch users (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
    post:
      operationId: createUser
      summary: Create a staff or manager user in the caller's active tenant (admin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [staff, manager] }
              required: [email, password, role]
      responses:
        "201":
          description: Created user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: Malformed body, or role is not staff/manager (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            Caller is not admin (HTTPError), tenant_suspended from the tenant
            gate (Error), or middleware.CheckLimits rejected the request
            because the tenant is at/over its "users" plan limit
            (LimitExceededError) — this middleware runs before the handler.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/LimitExceededError" }
        "500":
          description: >
            Password hash failure (e.g. password over bcrypt's 72-byte limit),
            or a store failure creating the user / tenant membership
            (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
  /api/users/{id}/qr-token:
    post:
      operationId: generateQRToken
      summary: Generate a QR-card login token for a staff user (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: New QR token for the target user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QRTokenResponse" }
        "400":
          description: id is not a UUID (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            Caller is not admin (HTTPError), or tenant_suspended from the
            tenant gate (Error).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Target user does not exist, or is not a member of the caller's
            active tenant (uniform 404 either way — doesn't reveal
            cross-tenant existence).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "500":
          description: Store failed to persist the new QR token (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
  /api/events:
    get:
      operationId: getEvents
      summary: All events in the caller's active tenant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Events for the tenant.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to fetch events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: createEvent
      summary: Create an event in the caller's active tenant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: string, format: date-time }
                location: { type: string }
              required: [name]
      responses:
        "201":
          description: >
            Created event. Usage is logged best-effort afterward (a LogUsage
            failure is logged server-side but does not fail the request).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: Malformed request body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            tenant_suspended from the tenant gate (Error), or
            middleware.CheckLimits rejected the request because the tenant
            is at/over its "events_per_month" plan limit
            (LimitExceededError) — this middleware runs before the handler
            and produces the exact same response shape as POST /api/users'
            CheckLimits branch, since the body is built from resourceType
            generically; only limit_type differs.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/LimitExceededError" }
        "500":
          description: Failed to create the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{id}:
    get:
      operationId: getEvent
      summary: A single event scoped to the caller's active tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership masks "foreign" as "missing" — no
            existence oracle).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updateEvent
      summary: >
        Full replace of an event's editable fields. Any authenticated tenant
        member can call this — the handler checks tenant ownership only, no
        role restriction.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Unlike PUT /api/tenants/{id}, every field here is applied
                unconditionally (event.Name = req.Name, etc.) — omitting a
                field in the body blanks it out rather than preserving the
                existing value. This is a full replace, not a partial patch.
              properties:
                name: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: string, format: date-time }
                location: { type: string }
                field_schema:
                  type: array
                  items: { type: string }
                custom_fields: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated event (fields applied verbatim from the request body).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event does not exist, or belongs to a different tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading or persisting the event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      operationId: patchEvent
      summary: >
        Partial update — only fields present in the body are changed
        (absent fields keep their stored values, unlike updateEvent's
        full replace). custom_fields is deliberately NOT patchable here:
        it holds the badge template, whose scoped save model arrives with
        the badge editor (P3). JSON null on a date field is treated the
        same as absent (clearing a date via PATCH is not supported).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: string, format: date-time }
                location: { type: string }
                field_schema:
                  type: array
                  maxItems: 200
                  items: { type: string }
      responses:
        "200":
          description: The updated event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          description: id is not a UUID, or the body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event not found or belongs to another tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error") or
            persisting the update ("Failed to update event").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteEvent
      summary: >
        Soft-delete an event (sets deleted_at; the row stays in the database).
        GetEvents/GetEvent already exclude soft-deleted events, so a deleted
        event disappears from every listing and 404s on direct fetch.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Event soft-deleted. No body.
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event not found or belongs to another tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error") or
            executing the soft delete ("Failed to delete event").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{id}/badge-zpl:
    post:
      operationId: badgeZpl
      summary: Generate ZPL for one attendee's badge from the event's stored badge template
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendee_id: { type: string, format: uuid }
              required: [attendee_id]
      responses:
        "200":
          description: >
            Generated ZPL. JSON-wrapped (content-type application/json), NOT
            raw text/plain — see BadgeZplResponse.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BadgeZplResponse" }
        "400":
          description: >
            Invalid event/attendee ID, missing or invalid attendee_id, the
            attendee does not belong to this event, or the event's stored
            badge template is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event or attendee does not exist, or belongs to a different
            tenant (both requireEventOwnership and requireAttendeeOwnership
            mask "foreign" as "missing").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event or attendee ownership
            (requireEventOwnership or requireAttendeeOwnership propagates a
            raw store error through writeErr's fallback branch, instead of
            masking it as a 404).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{id}/readiness:
    get:
      operationId: getEventReadiness
      summary: >
        Readiness pipeline state for one event — drives Home's readiness
        indicators and the workspace rail; ready=true unlocks the check-in
        launch (the launch flow itself is P4).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Readiness aggregate, steps in pipeline order.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventReadinessResponse" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event not found or belongs to another tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership or computing any of the
            step counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/stats:
    get:
      operationId: getEventStats
      summary: Event-level (and optionally zone-level) check-in KPI counters
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: zone
          in: query
          schema: { type: string, format: uuid }
          description: >
            If given, must be a zone belonging to this event; the response
            then includes zone_stats.
      responses:
        "200":
          description: Stats for the event (and zone, if requested).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventStatsResponse" }
        "400":
          description: event_id or zone is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist (or foreign tenant), or the zone does not
            exist / does not belong to this event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading the zone or computing the stats.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/staff:
    get:
      operationId: getEventStaff
      summary: Staff users assigned to an event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            Assigned staff, as full User records — store.GetEventStaff joins
            event_staff back to users, so this is an array of User, NOT the
            EventStaff assignment shape (see POST on this same path, which
            does return EventStaff).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "400":
          description: event_id is not a UUID (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Event does not exist, or belongs to a different tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership (Error, via writeErr),
            or fetching staff (echo.NewHTTPError shape).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/HTTPError" }
    post:
      operationId: assignStaffToEvent
      summary: Assign an existing tenant user as staff on an event (admin/manager only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
              required: [user_id]
      responses:
        "201":
          description: Created assignment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventStaff" }
        "400":
          description: >
            Invalid tenant/event/user ID, or a malformed request body — all
            via echo.NewHTTPError.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            Caller role is not admin/manager (echo.NewHTTPError →
            HTTPError), or tenant_suspended from the tenant gate (→ Error).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist / foreign tenant (Error, via
            requireEventOwnership+writeErr), or the target user does not
            exist / is not a member of the active tenant (HTTPError,
            "User not found", via echo.NewHTTPError).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/HTTPError" }
        "500":
          description: >
            Store failure resolving event ownership (Error), or persisting
            the assignment (echo.NewHTTPError shape).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/HTTPError" }
  /api/events/{event_id}/staff/{user_id}:
    delete:
      operationId: unassignStaffFromEvent
      summary: >
        Remove a staff member from an event. Idempotent — DELETE on a pair
        that was never assigned still returns 204 (the store's DELETE
        simply affects zero rows; there is no existence check).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Staff member removed (or was not assigned to begin with).
        "400":
          description: event_id or user_id is not a UUID (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership) — note this checks event_id only, not that
            user_id was ever actually assigned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership or persisting the removal.
            Both failures emit the standard Error shape.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/stations/provisioning-token:
    post:
      operationId: createStationProvisioningToken
      summary: >
        Mint a short-lived (10-minute), one-time station-provisioning token
        bound to a specific staff user (admin/manager only).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                staff_user_id: { type: string, format: uuid }
              required: [staff_user_id]
      responses:
        "201":
          description: Token to encode as a QR code for the mobile device to scan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateProvisioningTokenResponse" }
        "400":
          description: >
            Malformed body, event_id is not a UUID, or the target staff
            user's tenant-scoped role is neither staff nor manager.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Caller role is not admin/manager, or tenant_suspended from the
            tenant gate — both render as the Error shape here (unlike
            AssignStaffToEvent, this handler uses c.JSON throughout, never
            echo.NewHTTPError).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist / foreign tenant, or the target staff user
            does not exist / is not a tenant member (uniform 404 either way
            — doesn't reveal cross-tenant existence).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Token generation or persistence failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/attendees:
    get:
      operationId: getAttendees
      summary: >
        Attendees for an event, optionally filtered by an exact code match
        (mobile QR/barcode scan lookup) and/or a search substring across
        name/email/code (mobile attendee search). Omitting both query
        params returns the full event attendee list.
      description: >
        Response shape is a discriminated-by-param-presence oneOf: when
        NEITHER `page` nor `per_page` is present, the response is the
        legacy bare array of Attendee (back-compat for mobile clients,
        unchanged). When EITHER `page` or `per_page` is present, the
        response is an AttendeeListPage envelope instead, and `zone` /
        `status` additionally narrow the result set. `page` defaults to 1
        and `per_page` defaults to 50 when only one of the pair is given.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: code
          in: query
          schema: { type: string }
          description: Exact match against Attendee.code.
        - name: search
          in: query
          schema: { type: string }
          description: Substring match across name/email/code.
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
          description: >
            1-indexed page number. Presence of this param (or per_page)
            switches the response to the AttendeeListPage envelope.
            Defaults to 1 if only per_page is given. Must be >= 1.
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
          description: >
            Page size. Presence of this param (or page) switches the
            response to the AttendeeListPage envelope. Defaults to 50 if
            only page is given. Must be between 1 and 200 inclusive.
        - name: zone
          in: query
          schema: { type: string, format: uuid }
          description: >
            Event zone UUID. Only applied in the paginated envelope mode
            (page or per_page present); narrows to attendees with an
            explicit attendee_zone_access row for that zone with
            allowed=true.
        - name: status
          in: query
          schema: { type: string, enum: [checked_in, not_checked_in] }
          description: >
            Only applied in the paginated envelope mode (page or per_page
            present); filters on Attendee.checkin_status.
      responses:
        "200":
          description: >
            Attendees for the event. A bare array when neither page nor
            per_page is present (legacy shape, unfiltered by zone/status);
            an AttendeeListPage envelope otherwise.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: "#/components/schemas/Attendee" }
                  - { $ref: "#/components/schemas/AttendeeListPage" }
        "400":
          description: >
            event_id is not a UUID, or (paginated mode only) page < 1,
            per_page outside 1..200, zone is not a UUID, or status is
            neither checked_in nor not_checked_in.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership masks "foreign" as "missing").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            fetching attendees ("Failed to fetch attendees") — both render
            as Error via c.JSON.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: createAttendee
      summary: Create an attendee for an event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                No field is required by the handler — an empty body creates
                an attendee with every field blank. code defaults to a
                generated UUID string when omitted or empty.
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string }
                company: { type: string }
                position: { type: string }
                code: { type: string }
                custom_fields: { type: object, additionalProperties: true }
      responses:
        "201":
          description: >
            Created attendee. Usage is logged best-effort afterward (a
            LogUsage failure is logged server-side but does not fail the
            request), same pattern as POST /api/events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendee" }
        "400":
          description: >
            event_id is not a UUID — checked identically by
            middleware.CheckAttendeeLimits before the handler runs, so the
            handler's own duplicate check on this route is unreachable — or
            the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            tenant_suspended from the tenant gate (Error), or
            middleware.CheckAttendeeLimits rejected the request because the
            event is at/over its attendees_per_event plan limit
            (LimitExceededError). For this single-create route (adding
            always =1), CheckAttendeeLimits happens to build the exact same
            body shape as middleware.CheckLimits even though it's a
            separate function — contrast BulkLimitExceededError on the
            /bulk route, where "adding" (the batch size) is a real extra
            field.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/LimitExceededError" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership, checked by the handler after the
            middleware passes).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            middleware.CheckAttendeeLimits' own store failure checking the
            limit ("Failed to check attendee limit" — unlike
            middleware.CheckLimits, which folds a store error into the same
            403 as a real limit breach, CheckAttendeeLimits surfaces a
            store failure honestly as a 500), a store failure resolving
            event ownership ("Internal error"), or a failure persisting the
            attendee ("Failed to create attendee"). All render as Error via
            c.JSON.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/attendees/bulk:
    post:
      operationId: bulkCreateAttendees
      summary: CSV-import bulk-create attendees for an event, skipping rows that duplicate an existing email or code
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendees:
                  type: array
                  maxItems: 5000
                  items: { type: object, additionalProperties: true }
                  description: One object per row; keys map to standard fields case-insensitively, everything is also kept in custom_fields.
                field_schema:
                  type: array
                  maxItems: 200
                  items: { type: string }
                  description: If given, replaces the event's stored field_schema (persisted best-effort; failure is logged, not returned).
              required: [attendees]
      responses:
        "201":
          description: >
            Import summary. Per-row failures (duplicate emails/codes and
            CreateAttendee errors) are tracked in the errors array with
            row number, display data, and problem code; they are also counted
            in the skipped total.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkImportResponse" }
        "400":
          description: >
            event_id is not a UUID, the request body is malformed, or
            attendees is empty — all via echo.NewHTTPError.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: >
            tenant_suspended from the tenant gate (Error), or the whole
            batch would push attendees_per_event over its plan max
            (BulkLimitExceededError) — checked in-handler via
            Store.CheckAttendeeLimit(..., len(req.Attendees)), NOT
            middleware.CheckAttendeeLimits (which only wraps the
            single-create route and always checks adding=1).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/BulkLimitExceededError" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error", via
            writeErr — Error shape), or a failure checking the batch limit
            ("Failed to check attendee limit", via echo.NewHTTPError —
            HTTPError shape). The field-schema update and the
            existing-attendees lookup both degrade gracefully on failure
            (logged only) rather than returning an error to the client.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/HTTPError" }
  /api/events/{event_id}/attendees/generate-codes:
    post:
      operationId: generateAttendeeCodes
      summary: Backfill a unique code for every attendee in the event that doesn't already have one
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            Count of attendees updated. Per-attendee UpdateAttendee
            failures inside the loop are logged and skipped, not surfaced
            as errors.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenerateAttendeeCodesResponse" }
        "400":
          description: event_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            fetching attendees ("Failed to get attendees").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/attendees/export:
    get:
      operationId: exportAttendeesCsv
      summary: CSV export of an event's attendees (Content-Disposition attachment)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            CSV body built with encoding/csv into a strings.Builder and sent
            via c.String — NOT any of the JSON error shapes. The handler
            sets Content-Type: text/csv explicitly before calling c.String;
            Echo's writeContentType only sets a header when one isn't
            already present, so the explicit text/csv wins over Echo's
            text/plain default for c.String. Every header/cell (including
            attacker-controlled custom-field keys sourced from
            ExternalImport) is passed through sanitizeCSVField, which
            prefixes values starting with =, +, -, @, tab, or CR with a
            single quote to neutralize CSV/formula injection.
          content:
            text/csv:
              schema:
                type: string
                description: Raw CSV text — a header row plus one row per attendee.
        "400":
          description: event_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"),
            fetching attendees ("Failed to get attendees"), or writing the
            CSV itself ("Failed to write CSV header" / "Failed to generate
            CSV" — both effectively unreachable with a strings.Builder
            target, but present in the code and share this same Error
            shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/attendees/{id}/qr:
    get:
      operationId: getAttendeeQr
      summary: PNG QR code image encoding the attendee's check-in code
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 256x256 PNG, medium error-correction level, Cache-Control public max-age=86400.
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: id is not a UUID (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Two distinct causes with distinct shapes. The attendee itself
            does not exist — OR a store failure loading it is masked as
            this same 404 ("Attendee not found", HTTPError via
            echo.NewHTTPError; unlike every other attendee handler, this
            one loads the attendee with the plain, non-tenant-scoped
            Store.GetAttendeeByID instead of requireAttendeeOwnership, so a
            store error and a real miss are indistinguishable here). Versus
            the attendee's event does not exist / belongs to a different
            tenant ("Event not found", Error via
            requireEventOwnership+writeErr, checked separately once the
            attendee has loaded).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/HTTPError" }
                  - { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the attendee's event ownership
            ("Internal error", Error via requireEventOwnership+writeErr),
            or qrcode.Encode failing because the code is too long to fit a
            QR symbol at this size/recovery level ("Failed to generate QR
            code", HTTPError via echo.NewHTTPError).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/HTTPError" }
  /api/attendees/{id}:
    get:
      operationId: getAttendeeDetail
      summary: >
        Fetch a single attendee by id. Used by the panel's attendee drawer to
        support deep-linking (?attendee=<id> must render correctly on a
        fresh page load, not just after a client-side row click where the
        data might already be cached).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The attendee.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendee" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Attendee does not exist, or belongs to a different tenant
            (requireAttendeeOwnership masks "foreign" as "missing").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving attendee ownership ("Internal error").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      operationId: updateAttendeeHandler
      summary: >
        Check-in status update (kept for backward compatibility — PATCH on
        this same path is the full profile update). Auto-fills
        checked_in_at and checked_in_by/checked_in_by_email on the first
        transition to checked-in, and clears all three on uncheck.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checkin_status: { type: boolean }
                checked_in_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: If provided while checking in, used verbatim instead of the server time.
      responses:
        "200":
          description: Updated attendee.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendee" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Attendee does not exist, or belongs to a different tenant
            (requireAttendeeOwnership masks "foreign" as "missing").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving attendee ownership ("Internal error"),
            or persisting the update ("Failed to update attendee").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      operationId: updateAttendeeInfo
      summary: Full update of an attendee's profile fields (every field optional; only provided fields are applied)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Every field is optional; only provided (non-null) fields are applied — same convention as PUT /api/tenants/{id}.
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string }
                company: { type: string }
                position: { type: string }
                code: { type: string }
                blocked: { type: boolean }
                custom_fields: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated attendee.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendee" }
        "400":
          description: id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Attendee does not exist, or belongs to a different tenant
            (requireAttendeeOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving attendee ownership ("Internal error"),
            or persisting the update ("Failed to update attendee").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteAttendee
      summary: Soft-delete an attendee (sets deleted_at; the row is never hard-deleted)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            Confirmation message — NOT the attendee record, unlike every
            other mutation on this resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                required: [message]
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Attendee does not exist, or belongs to a different tenant
            (requireAttendeeOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving attendee ownership ("Internal error"),
