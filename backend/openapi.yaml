          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist (or foreign tenant), or the zone does not
            exist / does not belong to this event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
