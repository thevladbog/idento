  /api/events/{event_id}/monitor:
    get:
      operationId: getEventMonitor
      summary: >
        Live monitor snapshot (P4.2 Task 3, spec §3.1) — totals with
        progress, scans/min + peak + estimated-done, per-zone breakdown,
