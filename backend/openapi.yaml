  /api/zones/{zone_id}/staff:
    post:
      operationId: assignStaffToZone
      summary: >
        Assign an existing tenant user as staff on a zone (admin/manager
        only; silently no-ops on a duplicate pair — store uses ON CONFLICT
        DO NOTHING)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: zone_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
              required: [user_id]
      responses:
        "201":
          description: >
            Assignment. Store.AssignStaffToZone sets id/assigned_at on the
            same pointer it's given before the INSERT. On a first assignment
            those are the persisted values. On a duplicate (user_id, zone_id)
            pair the INSERT is a no-op (ON CONFLICT DO NOTHING), yet the
            response still carries the freshly generated id/assigned_at —
            which were NOT persisted; the stored row keeps its original
            values from the first assignment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StaffZoneAssignment" }
        "400":
          description: zone_id is not a UUID, or the request body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Caller role is not admin/manager ("Access denied") — the gate
            sits after the zone_id parse but before requireZoneOwnership
            and the body bind, so a staff caller sees 403 even for a
            foreign/missing zone or a malformed body. Rendered via writeErr
            as the standard Error shape (contrast the event-staff siblings,
            whose role gate uses echo's HTTPError). Or tenant_suspended
            from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Zone does not exist, or its parent event does not exist / belongs
            to a different tenant (requireZoneOwnership). Or the target
            user_id has no role in the caller's active tenant ("User not
            found" — GetUserTenantRole returns "", covering both "user does
            not exist" and "user belongs to a different tenant", same
            uniform 404 either way; same membership check as
            POST /api/events/{event_id}/staff and GET /api/users/{user_id}/zones).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the zone's event ownership ("Internal
            error", from the nested requireEventOwnership call inside
            requireZoneOwnership — a GetEventZoneByID failure itself is
            masked as 404 above), checking the target user's tenant
            membership ("Failed to verify user membership" — unlike the
            membership 404 above, a GetUserTenantRole error is surfaced
            honestly as a 500), or persisting the assignment ("Failed to
            assign staff").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      operationId: getZoneStaff
      summary: All staff assigned to a zone, as raw assignment records
      security: [{ bearerAuth: [] }]
      parameters:
        - name: zone_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            Assignments for the zone (StaffZoneAssignment rows — NOT full
            User records, contrast GET /api/events/{event_id}/staff which
            joins through to users).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StaffZoneAssignment" }
        "400":
          description: zone_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Zone does not exist, or its parent event does not exist / belongs
            to a different tenant (requireZoneOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the zone's event ownership ("Internal
            error"), or fetching assignments ("Failed to get staff
            assignments").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/zones/{zone_id}/staff/{user_id}:
    delete:
      operationId: removeStaffFromZone
      summary: >
        Remove a staff member from a zone (admin/manager only). Idempotent —
        DELETE on a pair that was never assigned still returns 200 (the
        store's DELETE simply affects zero rows; there is no existence
        check).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: zone_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Confirmation message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                required: [message]
        "400":
          description: zone_id or user_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Caller role is not admin/manager ("Access denied") — the gate
            sits after the two UUID parses but before requireZoneOwnership,
            so a staff caller sees 403 even for a foreign/missing zone.
            Rendered via writeErr as the standard Error shape (contrast the
            event-staff siblings, whose role gate uses echo's HTTPError).
            Or tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Zone does not exist, or its parent event does not exist / belongs
            to a different tenant (requireZoneOwnership) — note this checks
            zone_id only, not that user_id was ever actually assigned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the zone's event ownership ("Internal
            error"), or persisting the removal ("Failed to remove staff").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/users/{user_id}/zones:
    get:
      operationId: getUserZoneAssignments
      summary: >
        All zone assignments for a target user. Authorization is NOT via
        requireEventOwnership/requireAttendeeOwnership/requireZoneOwnership
        (the target user_id is caller-supplied and unrelated to any single
        event/zone) — instead the handler checks membership in the caller's
        ACTIVE tenant directly via Store.GetUserTenantRole, inline (not one
        of the shared authz.go helpers). Non-members and unknown user_ids
        both render as the same uniform 404.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Zone assignments for the user (across every zone, not scoped to one event).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StaffZoneAssignment" }
        "400":
          description: user_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            user_id has no role in the caller's active tenant
            (GetUserTenantRole returns "" — covers both "user does not
            exist" and "user belongs to a different tenant", same uniform
            404 either way).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure checking tenant membership ("Failed to verify
            user membership" — unlike the 404 above, a GetUserTenantRole
            error is surfaced honestly as a 500, not folded into the 404),
            or fetching the assignments ("Failed to get zone assignments").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/zones/checkin:
    post:
      operationId: zoneCheckIn
      summary: >
        Scan an attendee's code at a zone: validates zone/time/registration/
        access, auto-registers on a registration zone, and records the
        check-in (idempotent per attendee/zone/event_day — re-scanning the
        same day returns 200 with message "Already checked in" instead of a
        duplicate record). Rate-limited like /auth/login (10 req/min per
        IP) since it's a high-frequency, low-friction scan surface.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendee_code: { type: string }
                zone_id: { type: string, format: uuid }
                event_day: { type: string, format: date-time }
              required: [attendee_code, zone_id, event_day]
      responses:
        "200":
          description: >
            Check-in recorded (message "Check-in successful"), or already
            recorded for this attendee/zone/event_day (message "Already
            checked in") — both success=true.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZoneCheckInResponse" }
        "400":
          description: Malformed request body (success=false, error "Invalid request").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZoneCheckInResponse" }
        "403":
          description: >
            Multiple distinct causes, two different shapes. Business-logic
            denials from inside the handler (ZoneCheckInResponse,
            success=false): caller is staff but not assigned to this zone
            ("Not assigned to this zone"), the zone is not active ("Zone is
            not active"), the current time is outside the zone's
            open/close window ("Zone is closed at this time"), the
            attendee must register first ("Attendee must register first"),
            or CheckZoneAccess denies / errors ("Access denied" or its
            error string). Versus tenant_suspended from the tenant gate,
            which runs BEFORE the handler and always uses the plain Error
            shape, never ZoneCheckInResponse.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/ZoneCheckInResponse" }
                  - { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Two causes, both rendered as ZoneCheckInResponse (success=false).
            The zone itself does not exist / its parent event does not
            exist or belongs to a different tenant (requireZoneOwnership's
            httpError re-wrapped into this response's shape instead of the
            plain Error shape every other requireZoneOwnership caller
            uses) — or the attendee_code does not match any attendee in the
            zone's event ("Attendee not found").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZoneCheckInResponse" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: >
            Store failure resolving the zone's event ownership, fetching
            zone staff assignments, persisting an auto-registration update,
            verifying existing check-in status, or persisting the new
            check-in — all rendered as ZoneCheckInResponse (success=false)
            since every return in this handler after Bind uses that shape,
            unlike every other zones.go handler which uses the plain Error
            shape for its 500s.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZoneCheckInResponse" }
  /api/zones/{zone_id}/checkins:
    get:
      operationId: getZoneCheckins
      summary: Check-ins for a zone on a specific day (defaults to today when ?date is omitted)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: zone_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: date
          in: query
          schema: { type: string }
          description: "YYYY-MM-DD; defaults to today (server time) when omitted."
      responses:
        "200":
          description: Check-ins for the zone on the requested (or default) day.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ZoneCheckin" }
        "400":
          description: zone_id is not a UUID, or date does not parse as YYYY-MM-DD.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Zone does not exist, or its parent event does not exist / belongs
            to a different tenant (requireZoneOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the zone's event ownership ("Internal
            error"), or fetching check-ins ("Failed to get check-ins").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/attendees/{attendee_id}/zone-history:
    get:
      operationId: getAttendeeZoneHistory
      summary: An attendee's full zone movement history, each entry enriched with the zone's name/type at read time
      security: [{ bearerAuth: [] }]
      parameters:
        - name: attendee_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Movement history for the attendee, most recent first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MovementHistoryEntry" }
        "400":
          description: attendee_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Attendee does not exist (or a GetAttendeeByID store failure is
            masked as the same 404 — this handler loads via the plain,
            non-tenant-scoped Store.GetAttendeeByID, same pattern as POST
            /api/attendees/{attendee_id}/zone-access), or the attendee's
            event does not exist / belongs to a different tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the attendee's event ownership
            ("Internal error"), or fetching the check-in history ("Failed
            to get history"). A per-entry GetEventZoneByID failure while
            enriching zone_name/zone_type is logged and skipped, not
            surfaced as an error — the checkin is still included with those
            fields blank.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/checkins/override:
    post:
      operationId: createCheckinOverride
      summary: >
        Log a staff override ("Всё равно пропустить") of an
        already_checked/not_registered/no_access check-in verdict, for
        audit purposes. Does not itself perform a check-in.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendee_id: { type: string, format: uuid }
                context: { type: string, enum: [already_checked, not_registered, no_access] }
                zone_id: { type: string, format: uuid, nullable: true }
              required: [attendee_id, context]
      responses:
        "201":
          description: Logged override.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckinOverride" }
        "400":
          description: >
            event_id is not a UUID, the request body is malformed, or
            context is not one of already_checked/not_registered/no_access.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Three causes, same shape. Event does not exist / foreign tenant
            (requireEventOwnership, "Event not found"). Attendee does not
            exist, belongs to a different event, OR a GetAttendeeByID store
            failure is masked identically ("Attendee not found" — the
            handler's check is `err != nil || attendee == nil ||
            attendee.EventID != eventID`, so a wrong-event attendee is
            indistinguishable from a missing one). Zone does not exist,
            belongs to a different event, OR a GetEventZoneByID store
            failure is masked identically ("Zone not found") — only
            checked when zone_id is given in the body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error", via
            requireEventOwnership+writeErr — the attendee/zone lookup
            failures above are masked as 404, not surfaced here), or
            persisting the override ("Failed to log override").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/stations/provision:
    post:
      operationId: provisionStation
      summary: >
        Redeem a one-time station-provisioning token and mint a station JWT.
        PUBLIC — the mobile device has no JWT yet, so this route is
        registered outside the /api group's JWT/TenantGate middleware
        (see handler.go) — and rate-limited with the same authLimiter as
        /auth/login (10 req/min per IP), since it's an unauthenticated,
        token-guessable surface.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                device_info: { type: object, additionalProperties: true }
              required: [token]
      responses:
        "200":
          description: >
            Station provisioned; the JWT is scoped to the token's bound
            staff user and their tenant-scoped role (not the user's global
            role column).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProvisionStationResponse" }
        "400":
          description: Malformed body, or missing token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Token is invalid, already consumed, or expired.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: >
            Failure redeeming the token, loading the event/staff user,
            resolving the staff user's tenant-scoped role, creating the
            station, or minting the JWT.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/api-keys:
    get:
      operationId: getApiKeys
      summary: List API keys issued for an event (never returns the secret material)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            API keys for the event. Store.GetAPIKeysByEventID's real
            (PGStore) implementation always initializes an empty slice
            before scanning rows, so this is a JSON array even with zero
            keys — never null (unlike GetFontsByEventID below, this handler
            has no nil-guard of its own, but doesn't need one).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIKey" }
        "400":
          description: event_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            Store.GetAPIKeysByEventID itself failing ("Failed to fetch API keys").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: createApiKey
      summary: >
        Mint a new API key for an event. The plain key is returned exactly
        once, in this response — only its SHA256 (indexed lookup) and
        bcrypt (verification) hashes are persisted, so it cannot be
        recovered afterward.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                models.CreateAPIKeyRequest. name's `binding:"required"` Go
                tag has no effect here — this handler's c.Bind never runs a
                validator, so an empty name is accepted and simply stored
                as-is.
              properties:
                name: { type: string }
                expires_at: { type: string, format: date-time, nullable: true }
      responses:
        "201":
          description: The newly created key, with plain_key populated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateAPIKeyResponse" }
        "400":
          description: >
            event_id is not a UUID (checked first) — or, once ownership has
            passed: the body fails to bind ("Invalid request"), or
            expires_at is set to a time in the past ("Expiration date must
            be in the future").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"),
            middleware.GenerateAPIKey failing ("Failed to generate API
            key" — practically unreachable, crypto/rand + bcrypt with a
            fixed valid cost), or Store.CreateAPIKey itself failing
            ("Failed to create API key").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/api-keys/{key_id}:
    delete:
      operationId: revokeApiKey
      summary: >
        Revoke an API key. Verifies key_id actually belongs to event_id
        before revoking (Store.GetAPIKeysByEventID + a membership scan) —
        without this check, owning any one event would let a caller revoke
        any API key in the system by pairing their own event_id with a
        victim's key_id from a different tenant's event (cross-tenant
        IDOR; see the comment above this check in api_keys.go).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: key_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Key revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                required: [message]
        "400":
          description: >
            event_id is not a UUID (checked first) — or, once ownership has
            passed, key_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist / belongs to a different tenant
            (requireEventOwnership) — or the event exists but key_id does
            not appear in its key list (the IDOR guard above; also covers a
            genuinely nonexistent key_id).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"),
            Store.GetAPIKeysByEventID failing while running the IDOR guard
            ("Failed to fetch API keys"), or Store.RevokeAPIKey itself
            failing ("Failed to revoke API key").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/fonts:
    get:
      operationId: getEventFonts
      summary: List an event's uploaded fonts (lightweight metadata only, no binary data)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            Fonts for the event, ordered by family/weight/style.
            Store.GetFontsByEventID's real (PGStore) implementation
            declares `var fonts []*models.FontListItem` (nil until
            appended), so it CAN return a nil slice for zero rows; the
            handler explicitly replaces nil with [] before serializing, so
            this is always a JSON array, never null.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FontListItem" }
        "400":
          description: event_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            Store.GetFontsByEventID itself failing ("Failed to get fonts").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: uploadEventFont
      summary: >
        Upload a custom font for an event (multipart/form-data). Requires
        accepting the font license terms; the file must be one of the
        supported formats and under the size limit.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: Exact field names read via c.FormValue/c.FormFile in UploadEventFont.
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    The font file. Extension must be .woff2, .woff, .ttf,
                    or .otf (case-insensitive, anything else is rejected);
                    max size 5MB.
                name: { type: string, description: "Display name, e.g. \"Roboto Bold\"." }
                family: { type: string, description: "CSS font-family value, e.g. \"Roboto\"." }
                weight: { type: string, description: "Defaults to \"normal\" server-side if omitted/empty." }
                style: { type: string, description: "Defaults to \"normal\" server-side if omitted/empty." }
                license_accepted:
                  type: string
                  description: >
                    Must be the literal string "true" (read via
                    c.FormValue, not a form boolean) or the request is
                    rejected with 400.
              required: [file, name, family, license_accepted]
      responses:
        "201":
          description: Font created (FontListItem shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FontListItem" }
        "400":
          description: >
            event_id is not a UUID (checked before ownership) — or, once
            ownership passes: license_accepted is not the literal string
            "true", name/family missing, an unrecognized file extension, or
            a file over 5MB.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: >
            A font with the same family/weight/style already exists for
            this event (Store.CreateFont's unique-constraint branch).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership, reading the uploaded
            file's contents, or Store.CreateFont itself failing ("Failed to
            save font").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/fonts/css:
    get:
      operationId: getEventFontCss
      summary: >
        Auto-generated @font-face CSS for all of an event's fonts, each
        pointing at GET /api/fonts/{id}/file.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            CSS built with fmt.Fprintf into a strings.Builder and sent via
            c.String, with Content-Type explicitly set to
            "text/css; charset=utf-8" beforehand (so Echo's default
            text/plain never applies). Body is "" with just the leading
            comment when the event has no fonts (not an error). Documented
            as `format: binary` — it is genuinely UTF-8 text, but text/css
            has no body decoder registered in the contract-test harness
            (openapi3filter only ships JSON-family, text/csv, and
            text/plain decoders), so `format: binary` routes decoding
            through the same raw-bytes path already used for the image/png
            responses elsewhere in this file, instead of failing with
            "unsupported content type".
          content:
            text/css:
              schema:
                type: string
                format: binary
        "400":
          description: event_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist, or belongs to a different tenant
            (requireEventOwnership).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            Store.GetFontsByEventID itself failing ("Failed to get fonts").
            Both render as application/json Error bodies, NOT text/css,
            despite the 200 response using a different content type.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/events/{event_id}/fonts/{font_id}:
    delete:
      operationId: deleteEventFont
      summary: Remove a font from an event
      security: [{ bearerAuth: [] }]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: font_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Font deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
        "400":
          description: event_id or font_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            tenant_suspended from the tenant gate — or the font exists but
            belongs to a different event than event_id ("Font does not
            belong to this event"), checked AFTER Store.GetFontByID
            succeeds by ID alone (font lookup is not scoped by event_id).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            Event does not exist / belongs to a different tenant
            (requireEventOwnership) — or font_id does not resolve at all
            (Store.GetFontByID returning ANY error, including a raw store
            failure, is uniformly masked as "Font not found"; unlike
            requireEventOwnership, there is no separate 500 branch for a
            font lookup failure here).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving event ownership ("Internal error"), or
            Store.DeleteFont itself failing ("Failed to delete font").
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/fonts/{id}/file:
    get:
      operationId: getFontFile
      summary: >
        Serve a font's binary file, for @font-face src or direct download.
        Despite the "Public font file endpoint" comment on its route
        registration (handler.go), this is NOT actually public: it is
        registered on the `api` group AFTER `api.Use(middleware.JWT())`
        (handler.go's RegisterRoutes runs `api.Use` once, before any routes
        — including this one — are added to that group), so every request
        requires a valid Bearer JWT and passes requireEventOwnership on the
        font's event, identically to every other /api/* route in this
        group.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: >
            The raw font bytes, with Cache-Control: public,
            max-age=31536000 and Content-Type set to the font's stored
            mime_type (font/woff2, font/woff, font/ttf, or font/otf,
            depending on the extension it was uploaded with). Documented
            under the font/* wildcard media type since the concrete
            Content-Type varies per font and none of the four has a
            registered body decoder in the contract-test harness;
            `format: binary` routes decoding through the raw-bytes
            fallback path, same as image/png elsewhere in this file.
          content:
            font/*:
              schema:
                type: string
                format: binary
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            font_id does not resolve at all (Store.GetFontByID returning
            ANY error, including a raw store failure, is uniformly masked
            as "Font not found") — or the font's event does not exist /
            belongs to a different tenant ("Event not found", via
            requireEventOwnership, checked only once the font itself has
            loaded).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: >
            Store failure resolving the font's event ownership ("Internal
            error", via requireEventOwnership+writeErr — the font lookup
            failure above is masked as 404, not surfaced here).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/machines/{machine_id}:
    put:
      operationId: upsertEquipmentMachine
      summary: >
        Register/refresh a machine (P4.3 spec §4.1) — reported whenever
        the panel/agent phones home with its identity. Idempotent:
        re-reporting the SAME (tenant, machine_id) updates
        hostname/agent_version/last_seen_at rather than erroring. An
        ORG-level resource: tenant_id from the JWT IS the ownership
        check, no requireEventOwnership. Returns the post-upsert state
        (machine + every device currently registered under it) — the
        same shape as GET below.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/EquipmentMachineUpsertRequest" }
      responses:
        "200":
          description: Post-upsert state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentMachineResponse" }
        "400":
          description: machine_id is not a UUID, or the body is malformed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: >
            Missing/invalid JWT claims (claimsFromContext/
            tenantIDFromContext) — "Invalid token".
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure upserting the machine or reloading its state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      operationId: getEquipmentMachine
      summary: >
        The machine's registry root plus every device registered under
        it (spec §4.1), scoped to the caller's tenant — an ORG-level
        resource, not tied to any one event, so there is no
        requireEventOwnership check here; tenant_id from the JWT IS the
        ownership check.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The machine + its devices.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentMachineResponse" }
        "400":
          description: machine_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            (tenant_id, machine_id) has never been registered — the
            panel renders this as "empty registry", not an error state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading the machine.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/machines/{machine_id}/devices:
    post:
      operationId: createEquipmentDevice
      summary: >
        Register a new device under a machine (spec §4.1). See
        EquipmentDeviceCreateRequest's description for the full
        class/kind/config validation rules. Responds 201 with the stored
        device — never wrapped, unlike the machine endpoints'
        {"machine":...,"devices":...} shape.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/EquipmentDeviceCreateRequest" }
      responses:
        "201":
          description: The newly created device.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentDevice" }
        "400":
          description: >
            machine_id is not a UUID, the body is malformed, or the
            parsed request fails validation — unknown class, class=camera
            (reserved, "camera devices are not supported yet"), a
            class/kind mismatch, empty display_name, an invalid/
            incomplete config for the class/kind, or make_default=true on
            a non-printer class.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: >
            make_default=true raced a concurrent default-printer write
            and lost (the partial-unique-index violation surfaced as a
            pgconn.PgError 23505, mapped here rather than a raw
            constraint error — see store.CreateEquipmentDevice).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure creating the device.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/devices/{device_id}:
    patch:
      operationId: patchEquipmentDevice
      summary: >
        Rename a device and/or replace its config (spec §4.1). Both
        fields optional; class/kind/machine_id are immutable. tenant_id
        from the JWT IS the ownership check — no requireEventOwnership
        (equipment is an ORG-level resource).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: device_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/EquipmentDevicePatchRequest" }
      responses:
        "200":
          description: The updated device.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentDevice" }
        "400":
          description: >
            device_id is not a UUID, the body is malformed, display_name
            is present but empty, or config is present but fails the
            device's existing class/kind validation rules.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            device_id does not exist, or belongs to a different tenant
            (GetEquipmentDeviceForTenant masks "foreign" as "missing" —
            no existence oracle).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading or updating the device.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteEquipmentDevice
      summary: >
        Remove a device outright (spec §4.1). No special-case handling
        for "was this the default printer" — it is simply gone; another
        device is never silently promoted to default.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: device_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted. No body.
        "400":
          description: device_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            device_id does not exist, or belongs to a different tenant
            (store.ErrDeviceNotFound).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure deleting the device.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/machines/{machine_id}/default-printer:
    put:
      operationId: putDefaultEquipmentPrinter
      summary: >
        Repoint (or clear) the machine's default printer (spec §4.1).
        device_id=null clears with no replacement; a non-null device_id
        must be an existing class=printer device of THIS machine — the
        clear-then-set transaction rolls back entirely (leaving the
        prior default untouched) when the target doesn't qualify.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/EquipmentDefaultPrinterRequest" }
      responses:
        "200":
          description: Echoes the request's device_id (the new default, or null).
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/EquipmentDefaultPrinterRequest" }
        "400":
          description: >
            machine_id is not a UUID, the body is malformed, device_id is
            missing entirely (it is required — send null explicitly to
            clear, so an accidentally-omitted field can never silently
            clear the default), or device_id is present but not a valid
            uuid/null.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            device_id doesn't exist, belongs to a different tenant/
            machine, or isn't a printer (store.ErrDeviceNotFound) — never
            returned when device_id is null (clearing always succeeds).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure setting the default printer.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/devices/{device_id}/test-passed:
    post:
      operationId: markEquipmentDeviceTestPassed
      summary: >
        Stamp test_passed_at = now() on a successful test-print/test-scan
        (the panel wizard's "Test" step, spec §4.1) — feeds
        TenantHasTestedDefaultPrinter, the equipment-readiness gate's
        underlying query (Task 4).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: device_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Stamped. No body.
        "400":
          description: device_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: >
            device_id does not exist, or belongs to a different tenant
            (store.ErrDeviceNotFound).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure recording the test result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/devices/{device_id}/pairing-qr.png:
    get:
      operationId: getPrinterPairingQR
      summary: >
        PNG QR code the mobile app scans to connect to this network printer
        (encodes the PrinterQRData JSON). Only class=printer, kind=network
        devices are eligible.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: device_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: PNG image of the pairing QR.
          content:
            image/png:
              schema: { type: string, format: binary }
        "400":
          description: device_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: device_id does not exist or belongs to a different tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: >
            Device is not a network printer (no reachable ip:port for a
            mobile pairing QR).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: QR generation failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/equipment/printers/pairing-export.csv:
    get:
      operationId: exportPrinterPairingCSV
      summary: >
        CSV of every network printer in the tenant's registry with a ready
        qr_payload column, for bulk label generation in an external tool.
        UTF-8 with BOM; one row per network printer.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: CSV (UTF-8 with BOM).
          content:
            text/csv:
              schema: { type: string }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store failure loading printers.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
