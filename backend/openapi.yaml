# Idento REST API — contract for the customer panel and shared surfaces.
#
# TRUTH RULES (P0.3):
# - This file is contract-tested: backend/internal/handler/openapi_contract_*_test.go
#   validates real handler responses against these schemas, and TestMain
#   (OPENAPI_COVERAGE=1) fails if any documented operation lacks a test.
# - New endpoints are documented HERE FIRST, then implemented, then contract-tested,
#   then the panel client is regenerated (npm run generate:api -w panel).
#
# INTENTIONALLY UNDOCUMENTED surfaces (documented in their own tracks):
#   /api/mobile/*, POST /api/zones/{zone_id}/scan          — mobile track
#   POST /api/events/{event_id}/checkins/batch             — mobile offline sync
#   GET|POST /api/sync                                     — desktop/mobile sync
#   POST /api/public/import                                — external API-key integration
#   /api/super-admin/*                                     — platform console (web/)
#   GET /api/version, /openapi.yaml, /docs, /printer-qr,
#   POST /api/util/printers/generate-qr                    — utility surfaces
openapi: 3.0.3
info:
  title: Idento API
  version: "1.0"
  description: Idento event check-in platform REST API.
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      description: >
        Standard handler error: {"error": "..."} with an optional machine code
        (e.g. code=tenant_suspended on 403 from the tenant gate). Closed shape
        (additionalProperties: false) so it never ambiguously matches the
        richer LimitExceededError body in a oneOf.
      properties:
        error: { type: string }
        code: { type: string }
      required: [error]
      additionalProperties: false
    HTTPError:
      type: object
      description: echo.NewHTTPError / rate-limiter shape.
      properties:
        message: { type: string }
      required: [message]
    LimitExceededError:
      type: object
      description: >
        middleware.CheckLimits 403 body when a tenant resource limit
        (e.g. users) is at or over its plan max.
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, upgrade_required, limit_type]
      additionalProperties: false
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string, enum: [admin, manager, staff] }
        is_super_admin: { type: boolean }
        has_qr_token: { type: boolean }
        qr_token_created_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, tenant_id, email, role, is_super_admin, has_qr_token, created_at, updated_at]
    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        archived_at: { type: string, format: date-time }
        settings: { type: object, additionalProperties: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, status, created_at, updated_at]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants, current_tenant]
    RegisterResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }
      required: [token, user, tenants]
    QrLoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [token, user]
    InstanceInfo:
      type: object
      properties:
        mode: { type: string, enum: [saas, onprem] }
        version: { type: string }
        license: { nullable: true }
      required: [mode, version]
    MeResponse:
      type: object
      description: The caller's identity as carried by the current JWT (not re-read from the DB).
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        role: { type: string }
      required: [user_id, tenant_id, role]
    SwitchTenantResponse:
      type: object
      properties:
        token: { type: string }
        current_tenant: { $ref: "#/components/schemas/Tenant" }
      required: [token, current_tenant]
    TenantMembership:
      type: object
      description: >
        A tenant summary annotated with the caller's role in it. Distinct
        from Tenant: this shape is built as a literal map (GetUserTenants,
        GetTenant), so every key is always present in the JSON — nullable
        fields serialize as null instead of being omitted, unlike Tenant's
        omitempty struct fields. Has no status/archived_at.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        settings: { type: object, additionalProperties: true, nullable: true }
        logo_url: { type: string, nullable: true }
        website: { type: string, nullable: true }
        contact_email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        role: { type: string }
      required: [id, name, settings, logo_url, website, contact_email, created_at, updated_at, role]
    QRTokenResponse:
      type: object
      properties:
        qr_token: { type: string }
        user_id: { type: string }
        email: { type: string }
      required: [qr_token, user_id, email]
    Event:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        start_date: { type: string, format: date-time, nullable: true }
        end_date: { type: string, format: date-time, nullable: true }
        location: { type: string }
        field_schema:
          type: array
          items: { type: string }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, tenant_id, name, created_at, updated_at]
    EventStaff:
      type: object
      description: >
        A staff-to-event assignment record — the response shape for POST
        /api/events/{event_id}/staff. Distinct from GET .../staff, which
        returns full User records (store.GetEventStaff joins through the
        event_staff table back to users, not this assignment row shape).
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by: { type: string, format: uuid }
      required: [id, event_id, user_id, assigned_at, assigned_by]
    ZoneScanStats:
      type: object
      properties:
        allowed: { type: integer }
        no_access: { type: integer }
        not_registered: { type: integer }
      required: [allowed, no_access, not_registered]
    EventStatsResponse:
      type: object
      properties:
        total_attendees: { type: integer }
        checked_in: { type: integer }
        zone_stats: { $ref: "#/components/schemas/ZoneScanStats" }
      required: [total_attendees, checked_in]
    ReadinessStep:
      type: object
      properties:
        key: { type: string, enum: [attendees, badge, zones, staff, equipment] }
        status: { type: string, enum: [done, not_done, skipped] }
        count: { type: integer }
      required: [key, status]
    EventReadinessResponse:
      type: object
      description: >
        Per-event readiness aggregate (parent-spec backend #6). Steps are
        always returned in pipeline order: attendees, badge, zones, staff,
        equipment. ready = attendees.done && badge.done && staff.done —
        zones never blocks (skipped when the event has no zones). equipment
        is done when the event's tenant has at least one equipment machine
        whose default printer has a passed test print (tenant-wide, not
        per-event); like zones, equipment never blocks ready.
      properties:
        ready: { type: boolean }
        steps:
          type: array
          items: { $ref: "#/components/schemas/ReadinessStep" }
      required: [ready, steps]
    BadgeZplResponse:
      type: object
      description: >
        JSON wrapper around generated ZPL text — BadgeZPL returns c.JSON,
        not raw text/plain, so "zpl" is the ZPL program serialized as a
        JSON string value (not a Content-Type: text/plain body).
      properties:
        zpl: { type: string }
      required: [zpl]
    BadgeTemplateResponse:
      type: object
      description: >
        GET/PUT /api/events/{id}/badge-template response. template is the
        stored badge-template JSON verbatim — whatever bytes were last PUT,
        including any unknown/extra keys (e.g. the panel editor's
        customFont) — the handler never re-serializes or drops fields; it
        is null when the event has no template yet. version starts at 0
        ("no template saved"); the first successful PUT (sent with
        version: 0) creates version 1, and every subsequent successful PUT
        bumps it by exactly one.
      properties:
        template:
          type: object
          nullable: true
          additionalProperties: true
        version: { type: integer }
      required: [template, version]
    BadgeTemplatePutRequest:
      type: object
      description: >
        PUT /api/events/{id}/badge-template request body. template is
        persisted verbatim (byte-for-byte, from the raw request bytes)
        after being validated against a parsed COPY via
        zpl.ParseBadgeTemplate — unknown keys survive a round trip
        untouched. version is the caller's last-known version (0 if the
        event has never had a template saved); it must match the stored
        version exactly or the request fails with 409
        (BadgeTemplateConflict).
      properties:
        template:
          type: object
          additionalProperties: true
        version: { type: integer, minimum: 0 }
      required: [template, version]
    BadgeTemplateConflict:
      type: object
      description: >
        409 body for PUT /api/events/{id}/badge-template when version no
        longer matches the event's stored version (optimistic concurrency
        — store.ErrVersionConflict). current_version is re-read via
        GetEventBadgeTemplate so the caller can re-fetch and retry with the
        correct version.
      properties:
        error: { type: string }
        current_version: { type: integer }
      required: [error, current_version]
      additionalProperties: false
    CheckinSettings:
      type: object
      description: >
        Per-event check-in station configuration (P4.1) — operator-only,
        no optimistic-concurrency version (unlike BadgeTemplateResponse):
        check-in settings have no concurrent-editor conflict class to
        guard against. Stored verbatim in events.checkin_settings JSONB.
      properties:
        print_on_checkin: { type: boolean }
        verdict_auto_dismiss_sec: { type: integer, minimum: 1, maximum: 30 }
        scan_input: { type: string, enum: [wedge, scanner, manual] }
        manual_search_enabled: { type: boolean }
      required:
        [
          print_on_checkin,
          verdict_auto_dismiss_sec,
          scan_input,
          manual_search_enabled,
        ]
      additionalProperties: false
    CheckinSettingsResponse:
      type: object
      description: >
        GET/PUT /api/events/{id}/checkin-settings response. settings is
        the stored check-in settings verbatim — whatever object was last
        PUT — and is null when the event has never had settings saved.
      properties:
        settings:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CheckinSettings"
      required: [settings]
    CheckinSettingsPutRequest:
      type: object
      description: >
        PUT /api/events/{id}/checkin-settings request body. settings is
        persisted verbatim (byte-for-byte, from the raw request bytes)
        after being validated against the CheckinSettings shape.
      properties:
        settings:
          $ref: "#/components/schemas/CheckinSettings"
      required: [settings]
    CheckinStation:
      type: object
      description: >
        A registered check-in station (P4.1 Task 2) — distinct from the
        mobile-track Station (zone/kiosk devices): a checkin_station is
        name-scoped per event (UNIQUE(event_id, name)) and optionally
        bound to a zone. last_seen_at is refreshed by POST
        /api/events/{event_id}/checkin-stations/{id}/heartbeat.
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        zone_id: { type: string, format: uuid, nullable: true }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
      required: [id, event_id, name, last_seen_at, created_at]
    CheckinStationRegisterRequest:
      type: object
      description: >
        POST /api/events/{event_id}/checkin-stations request body. name
        identifies the station (UNIQUE per event) — registering the SAME
        name again is an upsert: zone_id is replaced (even back to null)
        and last_seen_at refreshed, never a duplicate row. zone_id, when
        present, must belong to the same event (400 otherwise).
      properties:
        name: { type: string, minLength: 1 }
        zone_id: { type: string, format: uuid, nullable: true }
      required: [name]
    CheckinStationResponse:
      type: object
      description: >
        POST /api/events/{event_id}/checkin-stations' response envelope —
        station is the registered (or re-registered) row.
      properties:
        station: { $ref: "#/components/schemas/CheckinStation" }
      required: [station]
    CheckinStationListResponse:
      type: object
      description: GET /api/events/{event_id}/checkin-stations' response envelope.
      properties:
        stations:
          type: array
          items: { $ref: "#/components/schemas/CheckinStation" }
      required: [stations]
    CheckinOutcome:
      type: string
      description: >
        Server-decided outcome of POST /api/events/{event_id}/checkin
        (P4.1 Task 3). "not_found" is deliberately NOT a value here — an
        unresolved scanned code is a client-side outcome (the code lookup
        itself returned empty) that never reaches this endpoint.
      enum: [checked_in, already_checked_in, blocked]
    StationCheckinRequest:
      type: object
      description: >
        POST /api/events/{event_id}/checkin request body (P4.1 Task 3).
        station_id, when present, must belong to the same event (400
        otherwise); it is optional — a station-less check-in is valid.
      properties:
        attendee_id: { type: string, format: uuid }
        station_id: { type: string, format: uuid, nullable: true }
      required: [attendee_id]
      additionalProperties: false
    CheckinInfo:
      type: object
      description: >
        The first-scan metadata block of StationCheckinResponse — for
        outcome checked_in this is THIS scan; for already_checked_in it is
        the ORIGINAL scan, never overwritten.
      properties:
        at: { type: string, format: date-time }
        by_email: { type: string }
        point_name: { type: string, nullable: true }
      required: [at, by_email]
    StationCheckinResponse:
      type: object
      description: >
        POST /api/events/{event_id}/checkin response. checkin is the
        first-scan metadata for outcome checked_in/already_checked_in, and
        null for outcome blocked (block_reason is read from attendee
        instead — a blocked attendee is never checked in).
      properties:
        outcome: { $ref: "#/components/schemas/CheckinOutcome" }
        attendee: { $ref: "#/components/schemas/Attendee" }
        checkin:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CheckinInfo"
      required: [outcome, attendee, checkin]
    UndoCheckinRequest:
      type: object
      description: >
        POST /api/events/{event_id}/checkin/undo request body (P4.1 Task
        3). station_id, when present, must belong to the same event (400
        otherwise); it is recorded on the checkin_actions feed row only.
      properties:
        attendee_id: { type: string, format: uuid }
        station_id: { type: string, format: uuid, nullable: true }
      required: [attendee_id]
      additionalProperties: false
    UndoCheckinResponse:
      type: object
      description: >
        POST /api/events/{event_id}/checkin/undo response — always 200,
        idempotent: undoing an attendee who is already not checked in
        still returns 200 with the (unchanged) attendee.
      properties:
        attendee: { $ref: "#/components/schemas/Attendee" }
      required: [attendee]
    CheckinActionAttendee:
      type: object
      description: Slim attendee projection embedded in a CheckinActionRow.
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        code: { type: string }
      required: [id, first_name, last_name, code]
    CheckinActionRow:
      type: object
      description: >
        One row of GET /api/events/{event_id}/checkin-actions' feed (P4.1
        Task 3) — the durable check-in/undo/reprint audit trail backing
        the station's recent-scans rail.
      properties:
        id: { type: string, format: uuid }
        action: { type: string, enum: [checkin, undo, reprint] }
        station_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        attendee: { $ref: "#/components/schemas/CheckinActionAttendee" }
      required: [id, action, created_at, attendee]
    CheckinActionsResponse:
      type: object
      description: GET /api/events/{event_id}/checkin-actions' response envelope.
      properties:
        actions:
          type: array
          items: { $ref: "#/components/schemas/CheckinActionRow" }
      required: [actions]
    MonitorPeak:
      type: object
      description: >
        The highest one-minute check-in bucket "today" (UTC) — totals.peak
        (P4.2 Task 3, spec §3.1) — paired with that bucket's start time.
        totals.peak is null instead when there have been no 'checkin'
        actions today.
      properties:
        rate: { type: number }
        at: { type: string, format: date-time }
      required: [rate, at]
      additionalProperties: false
    MonitorTotals:
      type: object
      description: >
        Monitor snapshot's totals block (P4.2 Task 3, spec §3.1).
        rate_per_min is the sum of 'checkin' actions in the last 5 minutes
        divided by 5, rounded to one decimal. peak is null when there have
        been no check-ins today. est_done_at is null when rate_per_min is
        effectively zero (< 0.1) or checked_in >= total (event already
        fully checked in).
      properties:
        checked_in: { type: integer }
        total: { type: integer }
        rate_per_min: { type: number }
        peak:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MonitorPeak"
        est_done_at: { type: string, format: date-time, nullable: true }
      required: [checked_in, total, rate_per_min, peak, est_done_at]
      additionalProperties: false
    MonitorZone:
      type: object
      description: >
        One zone's currently-checked-in count for the monitor snapshot's
        zones[] (P4.2 Task 3) — mirrors store.MonitorZoneCount. Zero-count
        zones are included, in event_zones.order_index order.
      properties:
        zone_id: { type: string, format: uuid }
        name: { type: string }
        checked_in: { type: integer }
      required: [zone_id, name, checked_in]
      additionalProperties: false
    MonitorStationRow:
      type: object
      description: >
        One check-in station's liveness + running count for the monitor
        snapshot's stations[] (P4.2 Task 3) — mirrors store.MonitorStation,
        ordered by name.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        zone_id: { type: string, format: uuid, nullable: true }
        last_seen_at: { type: string, format: date-time }
        checkin_count: { type: integer }
      required: [id, name, zone_id, last_seen_at, checkin_count]
      additionalProperties: false
    MonitorSnapshot:
      type: object
      description: >
        GET /api/events/{event_id}/monitor's response (P4.2 Task 3, spec
        §3.1) — everything the live monitor screen (board 7e) renders in
        one request. Invariant: sum(zones[].checked_in) + unattributed ==
        totals.checked_in (see store.GetMonitorZones). recent reuses the
        same CheckinActionRow shape as GET
        /api/events/{event_id}/checkin-actions (last 20, newest first).
      properties:
        totals: { $ref: "#/components/schemas/MonitorTotals" }
        zones:
          type: array
          items: { $ref: "#/components/schemas/MonitorZone" }
        unattributed: { type: integer }
        stations:
          type: array
          items: { $ref: "#/components/schemas/MonitorStationRow" }
        recent:
          type: array
          items: { $ref: "#/components/schemas/CheckinActionRow" }
      required: [totals, zones, unattributed, stations, recent]
      additionalProperties: false
    MarkAttendeePrintedRequest:
      type: object
      description: >
        POST /api/attendees/{attendee_id}/printed's OPTIONAL request body
        (P4.1 Task 4). Both fields are optional, but NOT independent of
        each other — the handler (attendee_printed.go) enforces two
        dependency/consistency constraints the schema below cannot express
        structurally (OpenAPI 3.0 has no clean native "field A requires
        field B" construct), documented in prose on each field and on the
        endpoint's 400 response instead: (1) station_id requires event_id
        to also be present — a station_id with no event_id is rejected
        with 400, not silently discarded (PR #77 bot-review round 1,
        Finding D); (2) event_id, when present, must match the attendee's
        actual event — a mismatched event_id is rejected with 400, never
        silently substituted (checked since this endpoint's reprint-logging
        was first built, Task 4). event_id is what actually gates the
        reprint-logging behavior — station_id is only meaningful (recorded
        on the feed row) when a validated event_id is also present. Absent
        entirely (or an absent/empty body) is the pre-existing back-compat
        path: counter-only, no checkin_actions row (the badge-editor's bulk
        print sends no body at all).
      properties:
        event_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Optional. When present, must match the attendee's actual event
            — a mismatched event_id is rejected with 400 ("Attendee does
            not belong to this event"), never silently substituted. Gates
            reprint-logging: only when event_id is present (and valid) does
            the handler log a checkin_actions ('reprint') row after the
            printed_count increment succeeds.
        station_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Optional, but REQUIRES event_id to also be present in the same
            request — station_id with no event_id is rejected with 400
            ("event_id is required when station_id is supplied"), not
            silently discarded (PR #77 bot-review round 1, Finding D). When
            both are present, station_id must also belong to the same
            event_id (400 "Station not found in event" otherwise).
    CreateProvisioningTokenResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
      required: [token, expires_at]
    ProvisionedStationConfig:
      type: object
      properties:
        event_id: { type: string, format: uuid }
        event_name: { type: string }
        staff_name: { type: string }
      required: [event_id, event_name, staff_name]
    ProvisionStationResponse:
      type: object
      properties:
        station_config: { $ref: "#/components/schemas/ProvisionedStationConfig" }
        staff_jwt: { type: string }
        device_number: { type: integer }
      required: [station_config, staff_jwt, device_number]
    Attendee:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        company: { type: string }
        position: { type: string }
        code: { type: string }
        checkin_status: { type: boolean }
        checked_in_at: { type: string, format: date-time, nullable: true }
        checked_in_by: { type: string, format: uuid, nullable: true }
        checked_in_by_email:
          type: string
          nullable: true
          description: Email of the user who checked the attendee in (set once, on the first check-in transition).
        checked_in_device_number: { type: integer, nullable: true }
        checked_in_point_name: { type: string, nullable: true }
        printed_count: { type: integer }
        blocked: { type: boolean }
        block_reason: { type: string, nullable: true }
        packet_delivered: { type: boolean }
        registered_at: { type: string, format: date-time, nullable: true }
        registration_zone_id: { type: string, format: uuid, nullable: true }
        custom_fields: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft-delete marker set by DELETE /api/attendees/{id}; the row is never hard-deleted.
      required:
        [
          id,
          event_id,
          first_name,
          last_name,
          email,
          company,
          position,
          code,
          checkin_status,
          printed_count,
          blocked,
          packet_delivered,
          created_at,
          updated_at,
        ]
    AttendeeListPage:
      type: object
      description: >
        Envelope returned by GET /api/events/{event_id}/attendees when the
        `page` or `per_page` query param is present. `total` is the count of
        attendees matching the active filters (code/search/zone/status)
        before paging is applied, not the length of `attendees`.
      properties:
        attendees:
          type: array
          items: { $ref: "#/components/schemas/Attendee" }
        total: { type: integer, description: Total matching attendees across all pages. }
        page: { type: integer }
        per_page: { type: integer }
      required: [attendees, total, page, per_page]
      additionalProperties: false
    DuplicateInfo:
      type: object
      description: One row BulkCreateAttendees skipped, keyed by why it was considered a duplicate of an existing attendee.
      properties:
        email: { type: string }
        code: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        reason: { type: string, enum: [email, code] }
      required: [email, first_name, last_name, reason]
    BulkRowError:
      type: object
      description: >
        Per-row error detail from BulkCreateAttendees. Row is 1-based index
        into the submitted attendees array. Data is display text
        (first_name+last_name trimmed, fallback to email, may be empty). Problem
        is a stable string the frontend switches on.
      properties:
        row: { type: integer, description: "1-based index in the request attendees array" }
        data: { type: string, description: "Display text for the row (first+last name, fallback to email)" }
        problem: { type: string, enum: [duplicate_email, duplicate_code, create_failed] }
      required: [row, data, problem]
    BulkImportResponse:
      type: object
      properties:
        message: { type: string }
        created: { type: integer }
        skipped: { type: integer }
        total: { type: integer }
        duplicates:
          type: array
          items: { $ref: "#/components/schemas/DuplicateInfo" }
        errors:
          type: array
          items: { $ref: "#/components/schemas/BulkRowError" }
          description: >
            Per-row errors from the import. Includes duplicates and CreateAttendee
            failures. Each error is tracked by row number, display data, and problem code.
      required: [message, created, skipped, total, errors]
    BulkLimitExceededError:
      type: object
      description: >
        BulkCreateAttendees' own 403 body when importing the whole batch
        would push attendees_per_event over its plan max — built inline in
        the handler (calling Store.CheckAttendeeLimit directly with
        adding=len(req.Attendees)), NOT middleware.CheckAttendeeLimits
        (which only wraps the single-create route and always checks
        adding=1). Same fields as LimitExceededError plus "adding" — the
        batch size being requested — so it cannot reuse that schema
        (LimitExceededError is additionalProperties: false).
      properties:
        error: { type: string }
        current: { type: integer }
        max: { type: integer, description: "-1 means unlimited" }
        adding: { type: integer }
        upgrade_required: { type: boolean }
        limit_type: { type: string }
      required: [error, current, max, adding, upgrade_required, limit_type]
      additionalProperties: false
    GenerateAttendeeCodesResponse:
      type: object
      properties:
        status: { type: string }
        updated_count: { type: integer }
        message: { type: string }
      required: [status, updated_count, message]
    EventZone:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        zone_type: { type: string, description: "registration, general, vip, workshop" }
        order_index: { type: integer }
        open_time: { type: string, nullable: true, description: "HH:MM format" }
        close_time: { type: string, nullable: true, description: "HH:MM format" }
        is_registration_zone: { type: boolean }
        requires_registration: { type: boolean }
        is_active: { type: boolean }
        settings: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        [
          id,
          event_id,
          name,
          zone_type,
          order_index,
          is_registration_zone,
          requires_registration,
          is_active,
          created_at,
          updated_at,
        ]
    EventZoneWithStats:
      type: object
      description: >
        GetEventZones' with_stats=true response shape (store.GetEventZonesWithStats) —
        each zone paired with aggregate counts computed at read time. zone is
        always populated (never null) — the store builds one of these per row
        already-scanned from GetEventZones.
      properties:
        zone: { $ref: "#/components/schemas/EventZone" }
        total_checkins: { type: integer }
        today_checkins: { type: integer }
        assigned_staff: { type: integer }
        access_rules_count: { type: integer }
      required: [zone, total_checkins, today_checkins, assigned_staff, access_rules_count]
    ZoneAccessRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        category: { type: string }
        allowed: { type: boolean }
        time_from:
          type: string
          nullable: true
          description: "HH:MM, inclusive lower bound; null = no lower bound"
        time_to:
          type: string
          nullable: true
          description: "HH:MM, inclusive upper bound; null = no upper bound"
        created_at: { type: string, format: date-time }
      required: [id, zone_id, category, allowed, created_at]
    AttendeeZoneAccess:
      type: object
      description: >
        An individual per-attendee access override for a zone (highest
        priority in CheckZoneAccess, above category-based ZoneAccessRule).
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        allowed: { type: boolean }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, attendee_id, zone_id, allowed, created_at, updated_at]
    StaffZoneAssignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        assigned_by:
          type: string
          format: uuid
          nullable: true
          description: The caller who created the assignment; nullable in the DB, always populated for rows created via POST /api/zones/{zone_id}/staff.
      required: [id, user_id, zone_id, assigned_at]
    ZoneCheckin:
      type: object
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        checked_in_at: { type: string, format: date-time }
        checked_in_by: { type: string, format: uuid, nullable: true }
        event_day: { type: string, format: date-time, description: "Date only — time component is truncated by the store." }
        metadata: { type: object, additionalProperties: true }
      required: [id, attendee_id, zone_id, checked_in_at, event_day]
    MovementHistoryEntry:
      type: object
      description: >
        One zone check-in enriched with the zone's name/type at read time
        (GetAttendeeZoneHistory). If the per-entry zone lookup fails, the
        checkin is still included with zone_name/zone_type left at their
        zero value ("") rather than failing the whole request.
      properties:
        checkin: { $ref: "#/components/schemas/ZoneCheckin" }
        zone_name: { type: string }
        zone_type: { type: string }
      required: [checkin, zone_name, zone_type]
    ZoneCheckInResponse:
      type: object
      description: >
        POST /api/zones/checkin's single response envelope, used for every
        status code the handler itself returns (200/400/403/404/500) — not
        just the success case. success is false and error is populated on
        every non-2xx path; checked_in_at has no omitempty on the Go struct
        so it always serializes (zero value on error paths).
      properties:
        success: { type: boolean }
        attendee: { $ref: "#/components/schemas/Attendee" }
        zone: { $ref: "#/components/schemas/EventZone" }
        checked_in_at: { type: string, format: date-time }
        packet_delivered: { type: boolean }
        message: { type: string }
        error: { type: string }
      required: [success, checked_in_at, packet_delivered]
    CheckinOverride:
      type: object
      description: Audit-logged staff override of an already_checked/not_registered/no_access check-in verdict ("Всё равно пропустить").
      properties:
        id: { type: string, format: uuid }
        attendee_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid, nullable: true }
        context: { type: string, enum: [already_checked, not_registered, no_access] }
        staff_user_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
      required: [id, attendee_id, context, staff_user_id, created_at]
    FontListItem:
      type: object
      description: >
        Lightweight font metadata (models.FontListItem) — the shape actually
        returned by GET /api/events/{event_id}/fonts (per item) and POST
        /api/events/{event_id}/fonts (the created item). The full
        models.Font (which also carries the raw binary Data and
        uploaded_by/license_accepted_at) is never serialized to JSON by any
        handler — Data is json:"-" and the other fields are simply not
        selected by GetFontsByEventID's query — so no separate "Font"
        component is defined here.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        family: { type: string, description: "CSS font-family value, e.g. \"Roboto\"." }
        weight: { type: string, description: "e.g. \"normal\", \"bold\", \"700\"." }
        style: { type: string, description: "\"normal\" or \"italic\"." }
        format: { type: string, enum: [woff2, woff, truetype, opentype], description: "Derived server-side from the uploaded file's extension." }
        size: { type: integer, description: "File size in bytes." }
        created_at: { type: string, format: date-time }
      required: [id, name, family, weight, style, format, size, created_at]
    APIKey:
      type: object
      description: >
        models.APIKey with key_hash/key_hash_bcrypt excluded (json:"-" in
        Go — the secret material is never returned once created; only
        key_preview, the first 8 characters of the plain key, is exposed
        for display).
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        key_preview: { type: string, description: "First 8 characters of the plain key plus \"...\"." }
        expires_at: { type: string, format: date-time, description: "Omitted (not null) when unset — Go's json:\",omitempty\" on a nil *time.Time." }
        last_used_at: { type: string, format: date-time, description: "Omitted (not null) when unset." }
        revoked_at: { type: string, format: date-time, description: "Omitted (not null) unless the key was revoked." }
        created_at: { type: string, format: date-time }
      required: [id, event_id, name, key_preview, created_at]
    CreateAPIKeyResponse:
      type: object
      description: >
        POST /api/events/{event_id}/api-keys's 201 body. plain_key is the
        only time the actual secret is ever returned — it is not
        recoverable afterward (only key_hash/key_hash_bcrypt are persisted).
      properties:
        api_key: { $ref: "#/components/schemas/APIKey" }
        plain_key: { type: string }
      required: [api_key, plain_key]
    EquipmentMachine:
      type: object
      description: >
        One computer's registry root (models.EquipmentMachine, P4.3 spec
        §4.1) — identified by the agent's persisted machine_id (the
        agent's local GET /info), scoped per tenant so a shared physical
        machine keeps disjoint registries per organization.
      properties:
        machine_id: { type: string, format: uuid }
        hostname: { type: string }
        agent_version: { type: string }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
      required:
        [machine_id, hostname, agent_version, last_seen_at, created_at]
      additionalProperties: false
    EquipmentDevice:
      type: object
      description: >
        One saved device (models.EquipmentDevice) — a printer or scanner
        attached to a registered machine (spec §4.1). config carries
        per-kind facts plus the stable agent-side identity link
        (config.agent_name / config.port_name); display_name is
        user-renameable and must never be treated as that link. The exact
        per-kind config shape is validated server-side (see
        EquipmentDeviceCreateRequest's description) but documented here
        only as a free-form object, since the required keys vary by
        class/kind.
      properties:
        id: { type: string, format: uuid }
        class: { type: string, enum: [printer, scanner, camera] }
        kind: { type: string, enum: [system, network, usb_wedge, com] }
        display_name: { type: string }
        config: { type: object, additionalProperties: true }
        is_default: { type: boolean }
        test_passed_at: { type: string, format: date-time, nullable: true }
        last_seen_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        [
          id,
          class,
          kind,
          display_name,
          config,
          is_default,
          test_passed_at,
          last_seen_at,
          created_at,
          updated_at,
        ]
      additionalProperties: false
    EquipmentMachineResponse:
      type: object
      description: >
        PUT/GET /api/equipment/machines/{machine_id}'s 200 response — the
        machine root plus every device registered under it (spec §4.1).
        devices is always a JSON array (possibly empty), never null.
      properties:
        machine: { $ref: "#/components/schemas/EquipmentMachine" }
        devices:
          type: array
          items: { $ref: "#/components/schemas/EquipmentDevice" }
      required: [machine, devices]
      additionalProperties: false
    EquipmentMachineUpsertRequest:
      type: object
      description: >
        PUT /api/equipment/machines/{machine_id} request body — the
        agent's self-reported hostname/agent_version, and optionally the
        device ids it currently sees attached (touches their
        last_seen_at; a device absent from this list is left untouched,
        never deleted).
      properties:
        hostname: { type: string }
        agent_version: { type: string }
        seen_device_ids:
          type: array
          items: { type: string, format: uuid }
      required: [hostname, agent_version]
      additionalProperties: false
    EquipmentDeviceCreateRequest:
      type: object
      description: >
        POST /api/equipment/machines/{machine_id}/devices request body
        (spec §4.1). class/kind pairs: printer→{system,network},
        scanner→{usb_wedge,com}; camera is reserved and rejected (400)
        until the camera cycle ships. config's allowed/required keys are
        validated server-side per EXACT class/kind pair, via a distinct
        decode shape per kind — a key valid for one kind but not another
        (e.g. a usb_wedge config carrying com's port_name, or a system
        printer carrying network's ip/port/dpi) is rejected the same way
        as a genuinely unrecognized key, not silently accepted and stored:
        printer kind=system allows only non-empty agent_name; kind=network
        allows non-empty agent_name, non-empty ip, port in [1,65535], and
        optional dpi; scanner kind=com allows only non-empty port_name;
        scanner kind=usb_wedge allows only terminator ∈ {enter,tab,none}.
        Config is persisted verbatim (the request's raw bytes).
        make_default is only accepted for class=printer (400
        otherwise) and, when true, atomically replaces whatever device
        currently holds the machine's default printer (transactional
        clear-then-set — see store.CreateEquipmentDevice; a lost race
        against a concurrent default-printer write surfaces as 409, not
        make_default's ordinary 400). test_passed, when true,
        additionally stamps test_passed_at at create time (equivalent to
        immediately calling POST
        /api/equipment/devices/{device_id}/test-passed).
      properties:
        class: { type: string, enum: [printer, scanner, camera] }
        kind: { type: string, enum: [system, network, usb_wedge, com] }
        display_name: { type: string }
        config: { type: object, additionalProperties: true }
        make_default: { type: boolean }
        test_passed: { type: boolean }
      required: [class, kind, display_name, config]
      additionalProperties: false
    EquipmentDevicePatchRequest:
      type: object
      description: >
        PATCH /api/equipment/devices/{device_id} request body. Both
        fields are optional — an omitted field keeps the device's
        current value (class/kind/machine_id are immutable and not
        settable here). When config IS supplied, it is validated against
        the device's EXISTING class/kind shape rules (the same rules as
        EquipmentDeviceCreateRequest.config), unknown keys rejected.
        Replacing config with a value that actually differs from the
        device's current one unconditionally resets test_passed_at to
        null, since the previous test result can no longer be trusted to
        describe this (possibly different) hardware.
      properties:
        display_name: { type: string }
        config: { type: object, additionalProperties: true }
      additionalProperties: false
    EquipmentDefaultPrinterRequest:
      type: object
      description: >
        PUT /api/equipment/machines/{machine_id}/default-printer request
        body, and also its 200 response shape (echoes back what was
        set). device_id = null clears the machine's default printer with
        no replacement; a non-null device_id must be an existing
        class=printer device of THIS machine (404 otherwise —
        store.ErrDeviceNotFound). device_id is REQUIRED and must be
        stated explicitly on every request — omitting the key entirely is
        rejected (400), precisely so an accidentally-omitted field can
        never be silently treated the same as an explicit clear request.
      properties:
        device_id: { type: string, format: uuid, nullable: true }
      required: [device_id]
      additionalProperties: false
  responses:
    RateLimited:
      description: Rate limit exceeded (10/min per IP).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/HTTPError" }
paths:
  /auth/login:
    post:
      operationId: login
      summary: Email + password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Authenticated; token carries the default tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          description: Malformed or empty email/password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Wrong credentials or user has no organizations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/register:
    post:
      operationId: register
      summary: Self-serve tenant + admin signup (SaaS-only — this route is not mounted on-prem and 404s there)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_name: { type: string }
                email: { type: string }
                password: { type: string }
              required: [tenant_name, email, password]
      responses:
        "201":
          description: Tenant created (or existing user attached to a new tenant).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400":
          description: Malformed or empty fields.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Existing email with wrong password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Store or token error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /auth/login-qr:
    post:
      operationId: loginWithQr
      summary: Staff login by QR-card token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_token: { type: string }
              required: [qr_token]
      responses:
        "200":
          description: Authenticated as the staff user's own tenant/role.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QrLoginResponse" }
        "400":
          description: Malformed body (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "401":
          description: Unknown or expired QR token (echo.NewHTTPError shape).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HTTPError" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: Token mint failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /health:
    get:
      operationId: health
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Process is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
  /api/instance:
    get:
      operationId: getInstance
      summary: Deployment mode & version (public — frontends read this before login)
      security: []
      responses:
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstanceInfo" }
  /api/me:
    get:
      operationId: getMe
      summary: >
        Caller's identity from the current JWT. NOTE: unlike every other
        /api/* route, this path is explicitly exempt from TenantGate
        (middleware.TenantGate hard-codes an early return for "/api/me"), so
        a suspended tenant's users can still resolve who they are — no 403
        tenant_suspended is possible here.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Identity carried by the token (not re-read from the DB).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/switch-tenant:
    post:
      operationId: switchTenant
      summary: Mint a new JWT scoped to a different tenant the caller belongs to
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id: { type: string }
              required: [tenant_id]
      responses:
        "200":
          description: New token scoped to the requested tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwitchTenantResponse" }
        "400":
          description: Malformed body, or tenant_id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            Impersonation sessions are sealed (no switching tenants while
            impersonating), or the caller has no membership in tenant_id.
            Also covers tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load the user/tenant, or to mint the token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants:
    get:
      operationId: getUserTenants
      summary: All organizations the caller belongs to, each annotated with their role
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Tenant memberships (role defaults to "viewer" if the per-tenant role lookup fails).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantMembership" }
        "403":
          description: tenant_suspended from the tenant gate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: Failed to load tenants for the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/tenants/{id}:
    get:
      operationId: getTenant
      summary: A single tenant/organization the caller has a role in
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tenant with the caller's role in it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantMembership" }
        "400":
          description: id is not a UUID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
