server {
    # Non-privileged port: the container runs as the unprivileged nginx user.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable hashed assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Regenerated by envsubst at every container start (PUBLIC_API_URL) — must
    # never be cached, or a browser can keep hitting a stale API URL after an
    # upgrade that changes it.
    location = /env.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
}
